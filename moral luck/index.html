<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Moral Luck</title>
<style>
  :root {
    --ink: #e8e2d3;
    --ink-dim: #a89f8a;
    --ink-faint: #6b6552;
    --bg: #0e0d0b;
    --bg-card: #16140f;
    --bg-card-2: #1c1913;
    --rule: #2a2620;
    --accent: #c9a85b;
    --accent-dim: #8a7235;
    --good: #87a96b;
    --bad: #b35a4a;
    --neutral: #8a8478;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 18px;
    line-height: 1.55;
    min-height: 100vh;
  }
  body {
    background:
      radial-gradient(ellipse at top, #1a1812 0%, #0e0d0b 50%, #050403 100%) fixed;
  }
  #app {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
    min-height: 100vh;
  }
  header.brand {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  header.brand .title {
    font-size: 14px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  header.brand .sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .scene {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 36px 36px 32px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    animation: fadein 0.6s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 12px;
  }
  h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-weight: 400;
    font-size: 36px;
    line-height: 1.15;
    margin: 0 0 20px;
    letter-spacing: -0.01em;
  }
  h2 {
    font-weight: 400;
    font-size: 26px;
    margin: 0 0 16px;
    line-height: 1.25;
  }
  p { margin: 0 0 16px; color: var(--ink); }
  p.lede { font-size: 20px; color: var(--ink); }
  p.dim { color: var(--ink-dim); }
  p.faint { color: var(--ink-faint); font-style: italic; }
  blockquote {
    margin: 24px 0;
    padding: 0 0 0 20px;
    border-left: 2px solid var(--accent-dim);
    color: var(--ink-dim);
    font-style: italic;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 28px;
  }
  .choice {
    background: var(--bg-card-2);
    border: 1px solid var(--rule);
    color: var(--ink);
    text-align: left;
    padding: 16px 20px;
    border-radius: 3px;
    cursor: pointer;
    font: inherit;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .choice:hover {
    border-color: var(--accent-dim);
    background: #221d15;
  }
  .choice:active { transform: translateY(1px); }
  .choice .label {
    display: block;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .btn {
    display: inline-block;
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 10px 22px;
    font: inherit;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: var(--accent); color: #1a1610; }
  .btn-row { margin-top: 28px; display: flex; gap: 12px; justify-content: flex-end; }

  /* die */
  .die-wrap {
    margin: 28px auto;
    text-align: center;
  }
  .die {
    display: inline-block;
    width: 88px; height: 88px;
    border: 2px solid var(--accent-dim);
    border-radius: 12px;
    background: var(--bg-card-2);
    color: var(--accent);
    font-family: Georgia, serif;
    font-size: 44px;
    line-height: 84px;
    text-align: center;
    box-shadow: 0 0 24px rgba(201,168,91,0.15);
  }
  .die.rolling { animation: shake 0.06s linear infinite; }
  @keyframes shake {
    0% { transform: translate(-2px, 1px) rotate(-3deg); }
    25% { transform: translate(2px, -1px) rotate(2deg); }
    50% { transform: translate(-1px, 2px) rotate(-2deg); }
    75% { transform: translate(2px, 1px) rotate(3deg); }
    100% { transform: translate(-2px, -2px) rotate(-1deg); }
  }
  .die-caption {
    margin-top: 12px;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* verdict */
  .verdict {
    border: 1px solid var(--rule);
    background: #0f0e0a;
    padding: 24px;
    margin: 20px 0 8px;
    border-radius: 3px;
  }
  .verdict .stamp {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .verdict .quote { font-style: italic; color: var(--ink-dim); margin-bottom: 0; }

  /* scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 24px 0 8px;
  }
  .score {
    border: 1px solid var(--rule);
    padding: 16px;
    border-radius: 3px;
    background: #0f0e0a;
  }
  .score .k {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .score .v {
    font-family: Georgia, serif;
    font-size: 28px;
    color: var(--accent);
  }
  .score .delta { font-size: 13px; color: var(--ink-dim); margin-top: 4px; }

  .progress {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 24px;
  }
  .pip {
    width: 22px; height: 4px;
    background: var(--rule);
    border-radius: 2px;
  }
  .pip.done { background: var(--accent-dim); }
  .pip.now { background: var(--accent); }

  .reveal {
    margin: 28px 0;
    padding: 20px 24px;
    background: #0f0e0a;
    border: 1px solid var(--rule);
    border-radius: 3px;
  }
  .reveal h3 {
    margin: 0 0 8px;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .alt-history {
    color: var(--ink-dim);
    font-size: 15px;
    font-style: italic;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
  }

  .endcap {
    text-align: center;
    margin: 40px 0 24px;
  }
  .endcap .ornament {
    color: var(--accent-dim);
    letter-spacing: 1em;
    font-size: 12px;
    margin-bottom: 16px;
  }

  /* small */
  @media (max-width: 600px) {
    #app { padding: 32px 16px 64px; }
    .scene { padding: 24px 22px; }
    h1 { font-size: 28px; }
    h2 { font-size: 22px; }
    .scoreboard { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">
  <header class="brand">
    <div class="title">Moral Luck</div>
    <div class="sub">A Game in Five Verdicts</div>
  </header>
  <main id="root"></main>
</div>

<script>
"use strict";

// ---------- Content ----------

const SCENARIOS = [
  {
    id: "drive",
    kind: "Resultant Luck",
    title: "The Drive Home",
    setup:
      "You're at a friend's wedding. You've had three glasses of wine — enough to feel it, " +
      "not enough to slur. Your car is in the lot. A cab would take forty minutes; the couch " +
      "is offered but lumpy. Your phone buzzes: it's the babysitter, the baby won't settle.",
    choices: [
      {
        id: "drive",
        label: "Drive",
        text: "Drive home. You're sure you're fine. The roads will be empty.",
        intent: 2, // lower = worse intent
        roll: {
          1: {
            outcome:
              "Halfway home, a child chases a ball into the street. You see her too late. " +
              "Brakes scream. She does not get up.",
            world: -5,
            verdict: "Drunk driver kills child. The town demands the maximum sentence.",
          },
          2: {
            outcome:
              "A police checkpoint. You blow over the limit. License gone, court date in March.",
            world: -2,
            verdict: "A foolish, dangerous choice — but no one was hurt.",
          },
          3: { default: true,
            outcome:
              "You arrive without incident. The baby is asleep by the time you walk in. " +
              "No one knows but you.",
            world: 0,
            verdict: "No verdict is rendered. There is no story to tell.",
          },
        },
      },
      {
        id: "cab",
        label: "Cab",
        text: "Call a cab. Wait the forty minutes. Apologize to the babysitter.",
        intent: 5,
        roll: {
          1: {
            outcome:
              "The cab is late. The babysitter quits. You get home at 3 a.m. to a furious partner.",
            world: 1,
            verdict: "Inconvenient, but the responsible choice.",
          },
          2: { default: true,
            outcome: "You get home tired but safe. The baby is fine. You sleep well.",
            world: 2,
            verdict: "Quietly admirable. Nobody throws you a parade for it.",
          },
        },
      },
      {
        id: "couch",
        label: "Stay",
        text: "Take the couch. Tell the babysitter it'll be morning.",
        intent: 4,
        roll: {
          1: { default: true,
            outcome: "You sleep poorly. The babysitter charges double. The baby was fine.",
            world: 1,
            verdict: "Sensible enough.",
          },
        },
      },
    ],
  },

  {
    id: "surgery",
    kind: "Resultant Luck",
    title: "The Tired Surgeon",
    setup:
      "You are a surgeon, sixteen hours into your shift. A patient is on the table for what " +
      "should be a routine appendectomy. Your hands are steady but your eyes are slow. " +
      "There is a colleague you could call, but she has just finished her own twelve hours.",
    choices: [
      {
        id: "proceed",
        label: "Proceed",
        text: "Continue the surgery yourself. You've done a hundred of these.",
        intent: 3,
        roll: {
          1: {
            outcome:
              "You nick a vessel you would have seen at hour two. The patient bleeds out on the table.",
            world: -5,
            verdict: "Negligent homicide by exhaustion. The hospital settles for millions.",
          },
          2: { default: true,
            outcome:
              "The surgery goes cleanly. The patient is in recovery within the hour. " +
              "You sign the chart and finally sit down.",
            world: 2,
            verdict: "Routine and efficient — a competent professional doing her job.",
          },
        },
      },
      {
        id: "wake",
        label: "Call",
        text: "Wake your colleague. Hand off the case. Accept her irritation.",
        intent: 5,
        roll: {
          1: { default: true,
            outcome:
              "She is annoyed, then grateful you asked. The surgery is uneventful. " +
              "You go home and sleep for eleven hours.",
            world: 2,
            verdict: "Cautious — by the book.",
          },
        },
      },
      {
        id: "postpone",
        label: "Postpone",
        text: "Push the surgery to the morning. The patient is stable enough.",
        intent: 2,
        roll: {
          1: {
            outcome:
              "The appendix ruptures at 4 a.m. The patient survives but with complications " +
              "she'll carry for years.",
            world: -3,
            verdict: "A documented delay. The malpractice suit names you specifically.",
          },
          2: { default: true,
            outcome:
              "The patient sleeps through the night. You operate at seven, rested. " +
              "Nobody files a complaint about the delay.",
            world: 1,
            verdict: "A scheduling decision. Forgettable.",
          },
        },
      },
    ],
  },

  {
    id: "tip",
    kind: "Circumstantial Luck",
    title: "The Tip",
    setup:
      "Your brother runs a small fund. Over dinner he lets slip — he is drunk, you are not — " +
      "that a company you both follow will be acquired on Monday at a forty percent premium. " +
      "He does not realize what he has told you. You have $30,000 in savings.",
    choices: [
      {
        id: "buy",
        label: "Buy",
        text: "Put it all in on Friday afternoon.",
        intent: 1,
        roll: {
          1: {
            outcome:
              "The deal goes through. The SEC notices the trade. Your brother is named. " +
              "He loses everything. You face charges.",
            world: -5,
            verdict: "Insider trader. White-collar criminal. Family destroyer.",
          },
          2: {
            outcome:
              "The deal falls apart over the weekend. The stock craters. You lose $22,000.",
            world: -1,
            verdict: "A reckless gamble. People will say you got what you deserved.",
          },
          3: { default: true,
            outcome:
              "The deal closes. You make $12,000 in a weekend. No one looks twice.",
            world: 1,
            verdict: "Lucky timing, people say. Some of them ask for tips.",
          },
        },
      },
      {
        id: "warn",
        label: "Warn",
        text: "Pull your brother aside the next morning. Tell him what he said. Don't trade.",
        intent: 5,
        roll: {
          1: { default: true,
            outcome:
              "He pales, thanks you, and is more careful after. You make nothing. " +
              "You also lose nothing.",
            world: 2,
            verdict: "A quiet kindness, witnessed by no one.",
          },
        },
      },
      {
        id: "ignore",
        label: "Forget",
        text: "Pretend you didn't hear. Don't trade. Don't bring it up.",
        intent: 3,
        roll: {
          1: { default: true,
            outcome:
              "The deal happens. He never realizes what he said. You read the news and feel " +
              "a strange ache.",
            world: 0,
            verdict: "Nothing happened. Nothing was judged.",
          },
        },
      },
    ],
  },

  {
    id: "bystander",
    kind: "Circumstantial Luck",
    title: "The Lake",
    setup:
      "You are walking the dog at dusk. Out on the lake, someone is in trouble — flailing, " +
      "going under, coming up. The water is February cold. You are not a strong swimmer. " +
      "Nobody else is in sight. Your phone has one bar.",
    choices: [
      {
        id: "jump",
        label: "Jump",
        text: "Strip your coat and dive in. Try to reach them.",
        intent: 5,
        roll: {
          1: {
            outcome:
              "The cold seizes your chest. You go under at twenty feet from shore. " +
              "Someone finds your dog the next morning, still waiting.",
            world: 3,
            verdict: "Tragic hero. They will name a bench after you.",
          },
          2: {
            outcome:
              "You reach them. They panic, climb you, push you under. You break free, " +
              "barely. Neither of you reaches the shore alive.",
            world: 1,
            verdict: "Two drowned. The papers call it 'unfortunate.'",
          },
          3: { default: true,
            outcome: "You reach them. They go limp. You drag them in. CPR. They cough. They live.",
            world: 5,
            verdict: "Hero. A photograph of you, soaked, holding the dog, goes around the town.",
          },
        },
      },
      {
        id: "call",
        label: "Call",
        text: "Dial 911 immediately. Shout. Wave your coat. Don't go in.",
        intent: 4,
        roll: {
          1: {
            outcome:
              "Dispatch picks up. By the time the rescue arrives, the lake is still. " +
              "They drag a body out at midnight.",
            world: -2,
            verdict: "Witnesses describe a coward on the shore who watched.",
          },
          2: { default: true,
            outcome:
              "The rescue boat arrives in eight minutes. They pull the swimmer out. " +
              "She survives. You are not mentioned in the news.",
            world: 2,
            verdict: "Cautious and effective. The textbook response.",
          },
        },
      },
      {
        id: "walk",
        label: "Walk",
        text: "It's not your problem. You'd just drown too. Keep walking.",
        intent: 1,
        roll: {
          1: {
            outcome: "A jogger comes along, sees the trouble, pulls the swimmer out.",
            world: -1,
            verdict: "A jogger gets the medal. You go home with your dog.",
          },
          2: { default: true,
            outcome: "No one comes. The lake is quiet by the time you reach the parking lot.",
            world: -3,
            verdict: "You are the only one who knows. The knowledge does not leave you.",
          },
        },
      },
    ],
  },

  {
    id: "birth",
    kind: "Constitutive Luck",
    title: "Where You Stand",
    setup:
      "Roll back the camera. Before any of the above, before the wedding and the lake, " +
      "before the medical school and the brokerage account — you are born. " +
      "You did not choose any of what follows.",
    constitutive: true,
    choices: [
      {
        id: "comfortable",
        label: "Quiet street",
        text: "A comfortable home. Good schools. Patient parents. A library card at four.",
        intent: 3,
        roll: {
          1: { default: true,
            outcome:
              "You grow up with the luxury of moral seriousness — time to read philosophy, " +
              "money to refuse jobs that bother you, friends who can vouch for you.",
            world: 2,
            verdict: "A good person. Everyone says so.",
          },
        },
      },
      {
        id: "hard",
        label: "Hard place",
        text: "A house that yells. Schools that don't. The kind of childhood that you survive.",
        intent: 3,
        roll: {
          1: { default: true,
            outcome:
              "You learn to take what you need before someone else does. You are not gentle. " +
              "You did not have the leisure to learn how.",
            world: -2,
            verdict: "A difficult person. Everyone says so.",
          },
        },
      },
      {
        id: "war",
        label: "Wrong century",
        text: "1938. Munich. Your father wears a brown shirt because the alternative is hunger.",
        intent: 3,
        roll: {
          1: { default: true,
            outcome:
              "You will spend the next decade making choices that history will judge. " +
              "Some of you who made them are heroes. Most are not. The math is mostly geography.",
            world: -4,
            verdict: "History will remember the country before it remembers the person.",
          },
        },
      },
    ],
  },
];

const FINAL_QUOTE = {
  text:
    "Where a significant aspect of what someone does depends on factors beyond his control, " +
    "yet we continue to treat him in that respect as an object of moral judgment, " +
    "it can be called moral luck.",
  attr: "— Thomas Nagel, 1979",
};

// ---------- State ----------

const state = {
  step: -1,      // -1 = title, 0..N-1 = scenarios, N = end
  history: [],   // { scenario, choice, roll, outcome, world, intent, verdict }
};

// ---------- Helpers ----------

const root = document.getElementById("root");

function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

function clear() { root.innerHTML = ""; }

function progressBar() {
  const wrap = el("div", { class: "progress" });
  for (let i = 0; i < SCENARIOS.length; i++) {
    let cls = "pip";
    if (i < state.step) cls += " done";
    else if (i === state.step) cls += " now";
    wrap.appendChild(el("div", { class: cls }));
  }
  return wrap;
}

function pickRoll(choice) {
  const faces = Object.keys(choice.roll).map(Number);
  const max = Math.max(...faces);
  const r = 1 + Math.floor(Math.random() * max);
  const outcome = choice.roll[r] || Object.values(choice.roll).find(o => o.default);
  return { face: r, max, outcome };
}

// ---------- Screens ----------

function renderTitle() {
  clear();
  const card = el("section", { class: "scene" }, [
    el("div", { class: "eyebrow" }, "An interactive essay"),
    el("h1", {}, "You will be judged for what happens."),
    el("p", { class: "lede" },
      "Five times you will face a choice. Five times a die will be rolled. " +
      "The world will watch only the outcome and pass its verdict accordingly."),
    el("p", { class: "dim" },
      "You alone will know what you intended. At the end, you will see the gap."),
    el("blockquote", { html: `“${FINAL_QUOTE.text}”<br><span style="font-style:normal;color:var(--ink-faint);font-size:14px">${FINAL_QUOTE.attr}</span>` }),
    el("div", { class: "btn-row" }, [
      el("button", { class: "btn", onClick: () => { state.step = 0; render(); } }, "Begin"),
    ]),
  ]);
  root.appendChild(card);
}

function renderScenario() {
  clear();
  const sc = SCENARIOS[state.step];
  root.appendChild(progressBar());
  const card = el("section", { class: "scene" }, [
    el("div", { class: "eyebrow" }, `Verdict ${state.step + 1} of ${SCENARIOS.length} · ${sc.kind}`),
    el("h2", {}, sc.title),
    el("p", { class: "lede" }, sc.setup),
    el("div", { class: "choices" },
      sc.choices.map(c =>
        el("button", { class: "choice", onClick: () => handleChoice(c) }, [
          el("span", { class: "label" }, c.label),
          el("span", {}, c.text),
        ]))),
  ]);
  root.appendChild(card);
}

function handleChoice(choice) {
  const sc = SCENARIOS[state.step];
  const { face, max, outcome } = pickRoll(choice);
  renderRoll(sc, choice, face, max, outcome);
}

function renderRoll(sc, choice, face, max, outcome) {
  clear();
  root.appendChild(progressBar());
  const die = el("div", { class: "die rolling" }, "?");
  const caption = el("div", { class: "die-caption" }, "The world rolls the die");
  const card = el("section", { class: "scene" }, [
    el("div", { class: "eyebrow" }, sc.title),
    el("h2", {}, "You chose: " + choice.label.toLowerCase() + "."),
    el("p", { class: "dim" }, choice.text),
    el("div", { class: "die-wrap" }, [die, el("div", {}, caption)]),
  ]);
  root.appendChild(card);

  // simulate roll
  const tickFaces = ["⚀","⚁","⚂","⚃","⚄","⚅"];
  let i = 0;
  const tick = setInterval(() => {
    die.textContent = tickFaces[i++ % 6];
  }, 70);
  setTimeout(() => {
    clearInterval(tick);
    die.classList.remove("rolling");
    die.textContent = tickFaces[Math.min(face, 6) - 1] || String(face);
    caption.textContent = `Face ${face} of ${max}`;
    setTimeout(() => renderOutcome(sc, choice, face, max, outcome), 700);
  }, 1100);
}

function renderOutcome(sc, choice, face, max, outcome) {
  // record
  state.history.push({
    scenarioId: sc.id, scenarioTitle: sc.title,
    choiceId: choice.id, choiceLabel: choice.label,
    intent: choice.intent,
    world: outcome.world,
    face, max,
    outcomeText: outcome.outcome,
    verdict: outcome.verdict,
  });

  clear();
  root.appendChild(progressBar());
  const card = el("section", { class: "scene" }, [
    el("div", { class: "eyebrow" }, sc.title + " · Outcome"),
    el("h2", {}, "What happened"),
    el("p", { class: "lede" }, outcome.outcome),
    el("div", { class: "verdict" }, [
      el("div", { class: "stamp" }, "The World's Verdict"),
      el("p", { class: "quote" }, "“" + outcome.verdict + "”"),
    ]),
    el("p", { class: "faint" },
      "Only you remember what you were trying to do."),
    el("div", { class: "btn-row" }, [
      el("button", {
        class: "btn",
        onClick: () => {
          state.step++;
          render();
        },
      }, state.step + 1 >= SCENARIOS.length ? "See the reckoning" : "Continue"),
    ]),
  ]);
  root.appendChild(card);
}

function renderEnd() {
  clear();
  const totalWorld = state.history.reduce((a, b) => a + b.world, 0);
  const totalIntent = state.history.reduce((a, b) => a + b.intent, 0);
  const maxIntent = state.history.length * 5;

  const card = el("section", { class: "scene" }, [
    el("div", { class: "eyebrow" }, "The Reckoning"),
    el("h1", {}, "Two ledgers."),
    el("p", { class: "lede" },
      "One belongs to the world. It saw what happened and judged you for it. " +
      "The other belongs to you. It knows what you were trying to do."),
    el("div", { class: "scoreboard" }, [
      el("div", { class: "score" }, [
        el("div", { class: "k" }, "The World's Ledger"),
        el("div", { class: "v" }, (totalWorld > 0 ? "+" : "") + totalWorld),
        el("div", { class: "delta" }, "tallied from outcomes"),
      ]),
      el("div", { class: "score" }, [
        el("div", { class: "k" }, "Your Ledger"),
        el("div", { class: "v" }, totalIntent + " / " + maxIntent),
        el("div", { class: "delta" }, "tallied from intentions"),
      ]),
    ]),
    el("p", { class: "dim" },
      "Re-roll the dice — same choices, different outcomes — and the world's ledger will read entirely differently. " +
      "The ledger that belongs to you will not move."),
  ]);
  root.appendChild(card);

  // per-scenario reveal with alt-history
  for (const h of state.history) {
    const sc = SCENARIOS.find(s => s.id === h.scenarioId);
    const choice = sc.choices.find(c => c.id === h.choiceId);
    const otherFaces = Object.entries(choice.roll)
      .filter(([f]) => Number(f) !== h.face);
    const alt = otherFaces.length
      ? "If the die had rolled differently: " +
        otherFaces.map(([f, o]) => `“${o.verdict}”`).join("  ·  ")
      : "There was only one way this could have gone.";

    root.appendChild(el("section", { class: "reveal" }, [
      el("h3", {}, h.scenarioTitle),
      el("p", {}, `You chose ${h.choiceLabel.toLowerCase()}. The die showed ${h.face}.`),
      el("p", { class: "dim" }, `World: ${h.world >= 0 ? "+" : ""}${h.world}   ·   Your intent: ${h.intent}/5`),
      el("div", { class: "alt-history" }, alt),
    ]));
  }

  root.appendChild(el("div", { class: "endcap" }, [
    el("div", { class: "ornament" }, "· · ·"),
    el("p", { class: "dim", style: "max-width:560px;margin:0 auto 24px" },
      "We assemble character from results. We praise the lucky and damn the unlucky and call it justice. " +
      "Moral luck is the name philosophers give to the fact that we do this, and cannot quite stop."),
    el("blockquote", { html: `“${FINAL_QUOTE.text}”<br><span style="font-style:normal;color:var(--ink-faint);font-size:14px">${FINAL_QUOTE.attr}</span>`,
      style: "max-width:560px;margin:0 auto 24px;text-align:left" }),
    el("button", { class: "btn", onClick: () => { state.step = -1; state.history = []; render(); } },
      "Roll again"),
  ]));
}

function render() {
  if (state.step === -1) return renderTitle();
  if (state.step >= SCENARIOS.length) return renderEnd();
  return renderScenario();
}

render();
</script>
