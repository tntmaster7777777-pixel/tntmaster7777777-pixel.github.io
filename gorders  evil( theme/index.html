<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GORDER - Pick Your Character</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Comic Sans MS", "Comic Sans", cursive, system-ui;
    background: radial-gradient(circle at top, #2a004f 0%, #100022 60%, #000 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #app { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* TITLE */
  .title-screen { text-align: center; padding: 60px 20px; }
  .title-screen h1 {
    font-size: 96px;
    background: linear-gradient(45deg, #ff3, #f06, #6cf, #3f6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 4px 4px 0 #000;
    letter-spacing: 6px;
    animation: wobble 2s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.04); }
  }
  .subtitle { font-size: 22px; margin: 18px 0 36px; color: #ffd; }

  button.big {
    background: linear-gradient(45deg, #ff0, #f60);
    border: 4px solid #fff;
    color: #000;
    font-family: inherit;
    font-size: 28px;
    padding: 16px 40px;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 6px 0 #800;
    transition: transform 0.1s;
  }
  button.big:hover { transform: translateY(-2px); }
  button.big:active { transform: translateY(4px); box-shadow: 0 2px 0 #800; }

  /* SCREEN */
  .screen { display: none; }
  .screen.active { display: block; animation: fadein 0.4s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  h2 { font-size: 40px; text-align: center; margin: 10px 0 24px; text-shadow: 3px 3px 0 #000; }
  h3 { font-size: 24px; margin: 12px 0 8px; color: #ffd; }

  /* CHARACTER GRID */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    margin-bottom: 24px;
  }
  .char-card {
    background: rgba(255,255,255,0.08);
    border: 3px solid #555;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .char-card:hover { border-color: #ff0; transform: translateY(-4px); background: rgba(255,255,0,0.1); }
  .char-card.selected { border-color: #0f0; background: rgba(0,255,0,0.15); box-shadow: 0 0 20px #0f0; }
  .char-card svg { width: 110px; height: 160px; display: block; margin: 0 auto; }
  .char-card .name { font-size: 22px; font-weight: bold; margin-top: 8px; color: #ff0; }
  .char-card .desc { font-size: 14px; color: #ccc; margin-top: 4px; }

  /* CUSTOM */
  .custom-wrap { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
  .preview-box { background: rgba(0,0,0,0.4); border: 3px dashed #ff0; border-radius: 16px; padding: 20px; text-align: center; position: sticky; top: 20px; }
  .preview-box svg { width: 100%; max-width: 250px; height: 360px; }
  .controls { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; }
  .control-row { margin-bottom: 18px; }
  .swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .swatch {
    width: 44px; height: 44px;
    border: 3px solid #fff;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.1s;
    position: relative;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.selected { border-color: #0f0; box-shadow: 0 0 12px #0f0; }
  .swatch .label { position: absolute; top: 50px; font-size: 10px; white-space: nowrap; left: 50%; transform: translateX(-50%); color: #fff; }

  /* SPELLS */
  .spell-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .spell-card {
    background: linear-gradient(135deg, #1a0033, #330066);
    border: 3px solid #66f;
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .spell-card.locked { background: linear-gradient(135deg, #003322, #006644); border-color: #0f0; cursor: default; }
  .spell-card.locked::before { content: "✦ READY ✦"; display: block; text-align: center; color: #0f0; font-weight: bold; font-size: 14px; margin-bottom: 6px; }
  .spell-card.pickable:hover { border-color: #ff0; transform: scale(1.03); }
  .spell-card.selected { border-color: #ff0; box-shadow: 0 0 20px #ff0; background: linear-gradient(135deg, #553300, #886600); }
  .spell-card .icon { font-size: 56px; text-align: center; }
  .spell-card .sname { font-size: 22px; font-weight: bold; color: #ff0; text-align: center; margin-top: 6px; }
  .spell-card .sdesc { font-size: 13px; color: #cde; margin-top: 8px; line-height: 1.4; }

  /* BATTLE */
  .battle-stage {
    background: linear-gradient(to bottom, #0a3 0%, #063 70%, #420 100%);
    border: 4px solid #fff;
    border-radius: 16px;
    padding: 20px;
    min-height: 360px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }
  .battler { text-align: center; position: relative; }
  .battler svg { width: 160px; height: 230px; }
  .hp-bar { background: #400; border: 2px solid #fff; border-radius: 8px; height: 22px; overflow: hidden; margin: 8px auto; max-width: 180px; }
  .hp-fill { background: linear-gradient(90deg, #f00, #f80, #0f0); height: 100%; transition: width 0.5s; }
  .battler .bname { font-size: 18px; font-weight: bold; }
  .battler .hp-text { font-size: 14px; color: #fff; }

  .spell-bar { display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
  .spell-btn {
    background: linear-gradient(135deg, #f06, #90f);
    border: 3px solid #fff;
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 0 #400;
  }
  .spell-btn:hover { background: linear-gradient(135deg, #f80, #f06); }
  .spell-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spell-btn .ic { font-size: 22px; margin-right: 4px; }

  .log {
    background: rgba(0,0,0,0.6); border: 2px solid #ff0; border-radius: 12px;
    padding: 12px; margin-top: 14px; min-height: 80px; font-size: 15px;
    max-height: 200px; overflow-y: auto;
  }
  .log-entry { margin-bottom: 4px; }
  .log-entry.heal { color: #0f0; }
  .log-entry.damage { color: #f44; }
  .log-entry.special { color: #ff0; font-weight: bold; }

  /* Floating effects */
  .float-text {
    position: absolute; font-size: 28px; font-weight: bold; pointer-events: none;
    animation: floatup 1.2s ease-out forwards;
  }
  @keyframes floatup {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-80px); opacity: 0; }
  }

  .nav { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  button.nav-btn {
    background: linear-gradient(45deg, #06f, #0cf);
    border: 3px solid #fff;
    color: #fff;
    font-family: inherit;
    font-size: 18px;
    padding: 10px 22px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 0 #024;
  }
  button.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  button.nav-btn:hover:not(:disabled) { background: linear-gradient(45deg, #0cf, #6ff); }

  .underwear-warn { font-size: 11px; color: #f88; margin-top: 4px; }

  /* heart/skittle/ant particles */
  .particle { position: absolute; font-size: 24px; pointer-events: none; }
  @keyframes heartfly {
    0% { transform: translate(0,0) scale(0.5); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.5); opacity: 0; }
  }
  @keyframes antcrawl {
    0% { transform: translate(0,40px); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(var(--dx), -200px); opacity: 0; }
  }
  @keyframes skitfall {
    0% { transform: translate(0, -40px) rotate(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(var(--dx), 200px) rotate(720deg); opacity: 0; }
  }
  @keyframes rope {
    0%, 90%, 100% { transform: translate(0,0); }
    50% { transform: translate(var(--dx), 100px); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- TITLE -->
  <div id="screen-title" class="screen active title-screen">
    <h1>GORDER</h1>
    <div class="subtitle">A game of heroes, spells, and questionable underwear</div>
    <button class="big" onclick="goTo('char')">START YOUR ADVENTURE</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="screen-char" class="screen">
    <h2>STEP 1: PICK YOUR CHARACTER</h2>
    <div class="char-grid" id="char-grid"></div>
    <div class="nav">
      <button class="nav-btn" onclick="goTo('title')">⬅ Back</button>
      <button class="nav-btn" id="char-next" disabled onclick="onCharNext()">Next ➡</button>
    </div>
  </div>

  <!-- CUSTOMIZE FARLEM -->
  <div id="screen-custom" class="screen">
    <h2>STEP 2: CUSTOMIZE FARLEM</h2>
    <div class="custom-wrap">
      <div class="preview-box">
        <div id="preview-name" style="font-size:22px;color:#ff0;margin-bottom:8px;">Farlem the Skeleton</div>
        <div id="preview-svg"></div>
      </div>
      <div class="controls" id="custom-controls"></div>
    </div>
    <div class="nav">
      <button class="nav-btn" onclick="goTo('char')">⬅ Back</button>
      <button class="nav-btn" onclick="goTo('spells')">Next ➡</button>
    </div>
  </div>

  <!-- SPELL SELECT -->
  <div id="screen-spells" class="screen">
    <h2>STEP 3: PICK YOUR SPELLS</h2>
    <p style="text-align:center;color:#cde;margin-bottom:20px;">Ant Lift and Heal are already in your spellbook. Pick ONE more!</p>
    <div class="spell-grid" id="spell-grid"></div>
    <div class="nav">
      <button class="nav-btn" onclick="onSpellBack()">⬅ Back</button>
      <button class="nav-btn" id="spell-next" disabled onclick="goTo('battle')">Begin Battle ➡</button>
    </div>
  </div>

  <!-- BATTLE -->
  <div id="screen-battle" class="screen">
    <h2>BATTLE!</h2>
    <div class="battle-stage" id="battle-stage">
      <div class="battler" id="hero-side">
        <div class="bname" id="hero-name"></div>
        <div id="hero-svg"></div>
        <div class="hp-bar"><div class="hp-fill" id="hero-hp-fill"></div></div>
        <div class="hp-text" id="hero-hp-text"></div>
      </div>
      <div class="battler" id="enemy-side">
        <div class="bname">GORDER LORD</div>
        <div id="enemy-svg"></div>
        <div class="hp-bar"><div class="hp-fill" id="enemy-hp-fill"></div></div>
        <div class="hp-text" id="enemy-hp-text"></div>
      </div>
    </div>
    <div class="spell-bar" id="spell-bar"></div>
    <div class="log" id="battle-log"></div>
    <div class="nav">
      <button class="nav-btn" onclick="restart()">↺ Restart Game</button>
    </div>
  </div>

</div>

<script>
// ---------------- STATE ----------------
const state = {
  character: null,
  custom: {
    hair: '#552200',
    shirt: '#0066cc',
    pants: '#222244',
    underwear: 'regular',
    shoes: '#3a1c00'
  },
  spells: ['antlift','heal'],
  hero: { hp: 100, maxHp: 100 },
  enemy: { hp: 500, maxHp: 500 },
  battleOver: false
};

// ---------------- CHARACTERS ----------------
const characters = [
  { id: 'farlem', name: 'Farlem', desc: 'A guy who is a skeleton', customizable: true },
  { id: 'alex', name: 'Alexander Meka', desc: 'A human king' },
  { id: 'xerfl', name: 'Xerfl', desc: 'The weirdo' },
  { id: 'sargon', name: 'Sargon', desc: 'The elf' },
  { id: 'spop', name: 'S Pop', desc: 'The human' }
];

// ---------------- CHARACTER SVG DRAWING ----------------
function drawCharacter(charId, custom = state.custom, scale = 1) {
  const c = custom;
  const underwearColors = {
    regular: '#fff',
    poopgreen: '#7a8c2a',
    red: '#cc0000'
  };
  const uColor = underwearColors[c.underwear] || '#fff';
  const uPattern = c.underwear === 'poopgreen' ? `
    <circle cx="60" cy="245" r="2.5" fill="#3a4a10"/>
    <circle cx="68" cy="240" r="2" fill="#3a4a10"/>
    <circle cx="52" cy="248" r="2" fill="#3a4a10"/>
    <circle cx="62" cy="251" r="1.8" fill="#3a4a10"/>
  ` : '';

  if (charId === 'farlem') {
    return `<svg viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
      <!-- hair on skull -->
      <path d="M30 50 Q30 25 60 25 Q90 25 90 50 Q88 35 60 32 Q32 35 30 50" fill="${c.hair}"/>
      <!-- skull -->
      <ellipse cx="60" cy="55" rx="28" ry="32" fill="#f0eada"/>
      <circle cx="50" cy="55" r="5" fill="#000"/>
      <circle cx="70" cy="55" r="5" fill="#000"/>
      <rect x="56" y="70" width="3" height="6" fill="#000"/>
      <rect x="62" y="70" width="3" height="6" fill="#000"/>
      <path d="M48 82 L52 78 L56 82 L60 78 L64 82 L68 78 L72 82" stroke="#000" stroke-width="2" fill="none"/>
      <!-- neck bone -->
      <rect x="56" y="88" width="8" height="10" fill="#f0eada"/>
      <!-- shirt -->
      <path d="M30 100 L90 100 L92 175 L28 175 Z" fill="${c.shirt}"/>
      <!-- arms (bones) -->
      <rect x="22" y="100" width="10" height="60" fill="${c.shirt}"/>
      <rect x="88" y="100" width="10" height="60" fill="${c.shirt}"/>
      <ellipse cx="27" cy="170" rx="6" ry="8" fill="#f0eada"/>
      <ellipse cx="93" cy="170" rx="6" ry="8" fill="#f0eada"/>
      <!-- underwear band peeking out -->
      <rect x="30" y="178" width="60" height="14" fill="${uColor}"/>
      ${uPattern}
      <!-- pants -->
      <rect x="30" y="190" width="28" height="70" fill="${c.pants}"/>
      <rect x="62" y="190" width="28" height="70" fill="${c.pants}"/>
      <!-- foot bones / shoes -->
      <ellipse cx="44" cy="275" rx="14" ry="10" fill="${c.shoes}"/>
      <ellipse cx="76" cy="275" rx="14" ry="10" fill="${c.shoes}"/>
    </svg>`;
  }

  if (charId === 'alex') {
    return `<svg viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
      <!-- crown -->
      <path d="M30 18 L40 5 L50 15 L60 0 L70 15 L80 5 L90 18 L90 30 L30 30 Z" fill="gold" stroke="#a80" stroke-width="2"/>
      <circle cx="60" cy="13" r="3" fill="red"/>
      <!-- head -->
      <ellipse cx="60" cy="55" rx="26" ry="28" fill="#ffd0a0"/>
      <circle cx="50" cy="55" r="3" fill="#000"/>
      <circle cx="70" cy="55" r="3" fill="#000"/>
      <path d="M50 70 Q60 76 70 70" stroke="#000" stroke-width="2" fill="none"/>
      <!-- beard -->
      <path d="M40 65 Q60 95 80 65 Q70 88 60 88 Q50 88 40 65" fill="#888"/>
      <!-- royal robe -->
      <path d="M25 95 L95 95 L100 195 L20 195 Z" fill="#7a0030"/>
      <rect x="55" y="95" width="10" height="100" fill="gold"/>
      <circle cx="60" cy="120" r="4" fill="gold"/>
      <circle cx="60" cy="145" r="4" fill="gold"/>
      <circle cx="60" cy="170" r="4" fill="gold"/>
      <!-- arms -->
      <rect x="18" y="100" width="12" height="80" fill="#7a0030"/>
      <rect x="90" y="100" width="12" height="80" fill="#7a0030"/>
      <circle cx="24" cy="185" r="8" fill="#ffd0a0"/>
      <circle cx="96" cy="185" r="8" fill="#ffd0a0"/>
      <!-- legs -->
      <rect x="32" y="200" width="24" height="70" fill="#4a0020"/>
      <rect x="64" y="200" width="24" height="70" fill="#4a0020"/>
      <!-- shoes -->
      <ellipse cx="44" cy="280" rx="14" ry="8" fill="#3a1a00"/>
      <ellipse cx="76" cy="280" rx="14" ry="8" fill="#3a1a00"/>
    </svg>`;
  }

  if (charId === 'xerfl') {
    return `<svg viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
      <!-- weird antenna hair -->
      <line x1="50" y1="30" x2="40" y2="5" stroke="#9c0" stroke-width="3"/>
      <line x1="70" y1="30" x2="85" y2="8" stroke="#9c0" stroke-width="3"/>
      <circle cx="40" cy="5" r="5" fill="#f0f"/>
      <circle cx="85" cy="8" r="5" fill="#0ff"/>
      <!-- lumpy head -->
      <path d="M30 50 Q25 80 60 88 Q95 80 90 50 Q90 25 60 22 Q30 25 30 50 Z" fill="#cdf0a0"/>
      <!-- three eyes -->
      <circle cx="44" cy="50" r="6" fill="#fff"/>
      <circle cx="44" cy="50" r="3" fill="#000"/>
      <circle cx="76" cy="50" r="6" fill="#fff"/>
      <circle cx="76" cy="50" r="3" fill="#000"/>
      <circle cx="60" cy="38" r="4" fill="#fff"/>
      <circle cx="60" cy="38" r="2" fill="#f00"/>
      <!-- tongue mouth -->
      <ellipse cx="60" cy="75" rx="10" ry="4" fill="#000"/>
      <path d="M60 75 Q63 88 58 92" stroke="#f06" stroke-width="3" fill="none"/>
      <!-- weird shirt -->
      <path d="M28 95 L92 95 L96 185 L24 185 Z" fill="#f0c"/>
      <circle cx="45" cy="130" r="6" fill="#0ff"/>
      <circle cx="75" cy="150" r="6" fill="#ff0"/>
      <rect x="55" y="140" width="10" height="10" fill="#0f0" transform="rotate(45 60 145)"/>
      <!-- arms one long one short -->
      <rect x="14" y="95" width="10" height="100" fill="#f0c"/>
      <rect x="96" y="95" width="10" height="40" fill="#f0c"/>
      <circle cx="19" cy="200" r="7" fill="#cdf0a0"/>
      <circle cx="101" cy="140" r="7" fill="#cdf0a0"/>
      <!-- pants different colors -->
      <rect x="28" y="190" width="30" height="75" fill="#06f"/>
      <rect x="62" y="190" width="30" height="75" fill="#f60"/>
      <!-- shoes -->
      <ellipse cx="44" cy="275" rx="14" ry="9" fill="#f0f"/>
      <ellipse cx="76" cy="275" rx="14" ry="9" fill="#0ff"/>
    </svg>`;
  }

  if (charId === 'sargon') {
    return `<svg viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
      <!-- long elf hair -->
      <path d="M30 40 Q25 80 30 120 L40 100 L40 50 Q50 35 60 35 Q70 35 80 50 L80 100 L90 120 Q95 80 90 40 Q90 18 60 18 Q30 18 30 40" fill="#daa520"/>
      <!-- head -->
      <ellipse cx="60" cy="55" rx="25" ry="28" fill="#ffe4c4"/>
      <!-- pointy ears -->
      <path d="M35 50 L25 40 L36 60 Z" fill="#ffe4c4"/>
      <path d="M85 50 L95 40 L84 60 Z" fill="#ffe4c4"/>
      <!-- eyes -->
      <ellipse cx="50" cy="55" rx="3" ry="4" fill="#0a0"/>
      <ellipse cx="70" cy="55" rx="3" ry="4" fill="#0a0"/>
      <!-- mouth -->
      <path d="M52 70 Q60 73 68 70" stroke="#a30" stroke-width="2" fill="none"/>
      <!-- green tunic -->
      <path d="M28 95 L92 95 L92 185 L28 185 Z" fill="#2a7a2a"/>
      <path d="M50 95 L60 110 L70 95" stroke="#1a4a1a" stroke-width="2" fill="none"/>
      <!-- belt -->
      <rect x="28" y="170" width="64" height="10" fill="#5a3a1a"/>
      <rect x="56" y="170" width="8" height="10" fill="gold"/>
      <!-- arms -->
      <rect x="16" y="100" width="12" height="80" fill="#2a7a2a"/>
      <rect x="92" y="100" width="12" height="80" fill="#2a7a2a"/>
      <circle cx="22" cy="185" r="8" fill="#ffe4c4"/>
      <circle cx="98" cy="185" r="8" fill="#ffe4c4"/>
      <!-- legs -->
      <rect x="32" y="185" width="24" height="80" fill="#3a3a1a"/>
      <rect x="64" y="185" width="24" height="80" fill="#3a3a1a"/>
      <!-- boots -->
      <ellipse cx="44" cy="275" rx="14" ry="10" fill="#2a1a0a"/>
      <ellipse cx="76" cy="275" rx="14" ry="10" fill="#2a1a0a"/>
      <!-- bow on back -->
      <path d="M100 110 Q108 150 100 190" stroke="#5a3a1a" stroke-width="3" fill="none"/>
    </svg>`;
  }

  if (charId === 'spop') {
    return `<svg viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
      <!-- hair -->
      <path d="M30 45 Q30 25 60 25 Q90 25 90 45 Q88 32 60 30 Q32 32 30 45" fill="#3a1a00"/>
      <!-- head -->
      <ellipse cx="60" cy="55" rx="25" ry="28" fill="#ffd0a0"/>
      <circle cx="50" cy="55" r="3" fill="#000"/>
      <circle cx="70" cy="55" r="3" fill="#000"/>
      <path d="M52 72 Q60 75 68 72" stroke="#a30" stroke-width="2" fill="none"/>
      <!-- shirt -->
      <path d="M28 95 L92 95 L92 185 L28 185 Z" fill="#0066aa"/>
      <text x="60" y="135" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">S</text>
      <!-- arms -->
      <rect x="16" y="100" width="12" height="80" fill="#0066aa"/>
      <rect x="92" y="100" width="12" height="80" fill="#0066aa"/>
      <circle cx="22" cy="185" r="8" fill="#ffd0a0"/>
      <circle cx="98" cy="185" r="8" fill="#ffd0a0"/>
      <!-- pants -->
      <rect x="30" y="185" width="28" height="80" fill="#222244"/>
      <rect x="62" y="185" width="28" height="80" fill="#222244"/>
      <!-- shoes -->
      <ellipse cx="44" cy="275" rx="14" ry="10" fill="#fff"/>
      <ellipse cx="76" cy="275" rx="14" ry="10" fill="#fff"/>
    </svg>`;
  }
  return '';
}

function drawEnemy() {

// ---------------- NAVIGATION ----------------
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  let actualId = id;
  if (id === 'spells') {
    if (state.character !== 'farlem' && id === 'custom') actualId = 'spells';
  }
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'char') renderCharGrid();
  if (id === 'custom') renderCustom();
  if (id === 'spells') renderSpells();
  if (id === 'battle') startBattle();
  window.scrollTo(0,0);
}

function onCharNext() {
  if (!state.character) return;
  if (state.character === 'farlem') goTo('custom');
  else goTo('spells');
}

function onSpellBack() {
  if (state.character === 'farlem') goTo('custom');
  else goTo('char');
}

// ---------------- CHAR GRID ----------------
function renderCharGrid() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  characters.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'char-card' + (state.character === ch.id ? ' selected' : '');
    card.innerHTML = `
      ${drawCharacter(ch.id)}
      <div class="name">${ch.name}</div>
      <div class="desc">${ch.desc}</div>
      ${ch.customizable ? '<div style="color:#ff0;font-size:12px;margin-top:4px;">✦ customizable ✦</div>' : ''}
    `;
    card.onclick = () => {
      state.character = ch.id;
      document.getElementById('char-next').disabled = false;
      renderCharGrid();
    };
    grid.appendChild(card);
  });
}

// ---------------- SPELLS ----------------
const SPELLS = {
  antlift: {
    name: 'Ant Lift',
    icon: '🐜',
    desc: 'Millions of ants carry you anywhere you want. Dodge the next attack and reposition!',
    damage: 50,
    type: 'dodge'
  },
  heal: {
    name: 'Heal',
    icon: '💚',
    desc: 'Restore 40 HP to yourself.',
    heal: 40,
    type: 'heal'
  },
  gurgling: {
    name: 'Gurgling Ear',
    icon: '👂',
    desc: 'Hearts come out of your ear! Heals teammates and you. HA YA! gives 90000 more damage.',
    heal: 30,
    damage: 90000,
    type: 'gurgle'
  },
  skiting: {
    name: 'Skiting',
    icon: '🌈',
    desc: 'Enemies eat skittles and become weak. They deal half damage next turn.',
    damage: 70,
    type: 'weaken'
  },
  tightrope: {
    name: 'Tightrope Fall',
    icon: '🪢',
    desc: 'Get the enemy onto a rope, walk on it, fall in the middle and crash them down hard!',
    damage: 120,
    type: 'crash'
  }
};

function renderSpells() {
  const grid = document.getElementById('spell-grid');
  grid.innerHTML = '';
  const lockedKeys = ['antlift','heal'];
  const pickableKeys = ['gurgling','skiting','tightrope'];

  lockedKeys.forEach(k => {
    const s = SPELLS[k];
    const card = document.createElement('div');
    card.className = 'spell-card locked';
    card.innerHTML = `<div class="icon">${s.icon}</div><div class="sname">${s.name}</div><div class="sdesc">${s.desc}</div>`;
    grid.appendChild(card);
  });
  pickableKeys.forEach(k => {
    const s = SPELLS[k];
    const card = document.createElement('div');
    const picked = state.spells.includes(k);
    card.className = 'spell-card pickable' + (picked ? ' selected' : '');
    card.innerHTML = `<div class="icon">${s.icon}</div><div class="sname">${s.name}</div><div class="sdesc">${s.desc}</div>`;
    card.onclick = () => {
      state.spells = ['antlift','heal',k];
      document.getElementById('spell-next').disabled = false;
      renderSpells();
    };
    grid.appendChild(card);
  });
}

// ---------------- BATTLE ----------------
let antLiftReady = false;
let skittlesDebuff = false;

function startBattle() {
  state.hero.hp = 100; state.hero.maxHp = 100;
  state.enemy.hp = 500; state.enemy.maxHp = 500;
  state.battleOver = false;
  antLiftReady = false;
  skittlesDebuff = false;

  const charNames = { farlem: 'Farlem', alex: 'Alexander Meka', xerfl: 'Xerfl', sargon: 'Sargon', spop: 'S Pop' };
  document.getElementById('hero-name').textContent = charNames[state.character];
  document.getElementById('hero-svg').innerHTML = drawCharacter(state.character);
  document.getElementById('enemy-svg').innerHTML = drawEnemy();

  // spell buttons
  const bar = document.getElementById('spell-bar');
  bar.innerHTML = '';
  state.spells.forEach(sk => {
    const s = SPELLS[sk];
    const btn = document.createElement('button');
    btn.className = 'spell-btn';
    btn.innerHTML = `<span class="ic">${s.icon}</span>${s.name}`;
    btn.onclick = () => castSpell(sk);
    bar.appendChild(btn);
  });

  document.getElementById('battle-log').innerHTML = '';
  log('A wild GORDER LORD appears! Fight with your spells!', 'special');
  updateHp();
}

function updateHp() {
  document.getElementById('hero-hp-fill').style.width = Math.max(0, state.hero.hp / state.hero.maxHp * 100) + '%';
  document.getElementById('hero-hp-text').textContent = `${Math.max(0, state.hero.hp)} / ${state.hero.maxHp} HP`;
  document.getElementById('enemy-hp-fill').style.width = Math.max(0, state.enemy.hp / state.enemy.maxHp * 100) + '%';
  document.getElementById('enemy-hp-text').textContent = `${Math.max(0, state.enemy.hp)} / ${state.enemy.maxHp} HP`;
}

function log(msg, cls='') {
  const el = document.getElementById('battle-log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + cls;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function floatText(side, text, color='#ff0') {
  const stage = document.getElementById(side + '-side');
  const ft = document.createElement('div');
  ft.className = 'float-text';
  ft.textContent = text;
  ft.style.color = color;
  ft.style.left = '50%';
  ft.style.top = '120px';
  ft.style.transform = 'translateX(-50%)';
  stage.appendChild(ft);
  setTimeout(() => ft.remove(), 1200);
}

function spawnParticles(side, emoji, anim, count=12) {
  const stage = document.getElementById(side + '-side');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emoji;
    p.style.left = (40 + Math.random()*80) + 'px';
    p.style.top = (100 + Math.random()*60) + 'px';
    p.style.setProperty('--dx', (Math.random()*120 - 60) + 'px');
    p.style.setProperty('--dy', (-Math.random()*120 - 40) + 'px');
    p.style.animation = `${anim} 1.5s ease-out forwards`;
    p.style.animationDelay = (i * 0.05) + 's';
    stage.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

function castSpell(key) {
  if (state.battleOver) return;
  const s = SPELLS[key];

  if (key === 'heal') {
    const h = s.heal;
    state.hero.hp = Math.min(state.hero.maxHp, state.hero.hp + h);
    log(`✨ You cast HEAL! +${h} HP restored.`, 'heal');
    floatText('hero', `+${h} HP`, '#0f0');
    spawnParticles('hero', '💚', 'heartfly', 8);
  } else if (key === 'antlift') {
    antLiftReady = true;
    state.enemy.hp -= s.damage;
    log(`🐜 Millions of ants lift you! You crash into the enemy for ${s.damage} damage and will dodge their next attack!`, 'special');
    floatText('enemy', `-${s.damage}`, '#f44');
    spawnParticles('hero', '🐜', 'antcrawl', 20);
  } else if (key === 'gurgling') {
    const h = s.heal;
    state.hero.hp = Math.min(state.hero.maxHp, state.hero.hp + h);
    const yelled = Math.random() < 0.5;
    let dmg = yelled ? s.damage : 200;
    state.enemy.hp -= dmg;
    log(`👂 Hearts pour from your ear! +${h} HP healed. ${yelled ? 'HA YA!!! +90000 BONUS DAMAGE!' : 'Standard gurgle hit.'} ${dmg} damage dealt!`, 'special');
    floatText('hero', `+${h} HP`, '#0f0');
    floatText('enemy', `-${dmg}`, '#f44');
    spawnParticles('hero', '❤️', 'heartfly', 12);
  } else if (key === 'skiting') {
    skittlesDebuff = true;
    state.enemy.hp -= s.damage;
    log(`🌈 The Gorder Lord is force-fed SKITTLES and becomes weak! Deals ${s.damage} damage and halves the enemy's next attack!`, 'damage');
    floatText('enemy', `-${s.damage}`, '#f0f');
    spawnParticles('enemy', '🌈', 'skitfall', 20);
  } else if (key === 'tightrope') {
    state.enemy.hp -= s.damage;
    log(`🪢 You lure the enemy onto a tightrope. You walk to the middle... and FALL! Both crash but they take ${s.damage} damage!`, 'special');
    state.hero.hp = Math.max(1, state.hero.hp - 10);
    floatText('enemy', `-${s.damage}`, '#f44');
    floatText('hero', `-10`, '#fa0');
  }

  updateHp();

  if (state.enemy.hp <= 0) {
    log('🎉 VICTORY! The Gorder Lord crumbles into dust!', 'special');
    state.battleOver = true;
    return;
  }

  // enemy turn
  setTimeout(enemyTurn, 900);
}

function enemyTurn() {
  if (state.battleOver) return;
  if (antLiftReady) {
    antLiftReady = false;
    log('🐜 The ants carry you away! You dodge the enemy attack!', 'heal');
    floatText('hero', 'DODGE!', '#0ff');
    return;
  }
  let dmg = 15 + Math.floor(Math.random() * 15);
  if (skittlesDebuff) { dmg = Math.floor(dmg / 2); skittlesDebuff = false; log('🌈 The skittles weaken the Gorder Lord\'s attack!', 'heal'); }
  state.hero.hp -= dmg;
  log(`💀 Gorder Lord strikes! ${dmg} damage to you.`, 'damage');
  floatText('hero', `-${dmg}`, '#f44');
  updateHp();
  if (state.hero.hp <= 0) {
    log('💀 You have fallen... But the Gorder will rise again next time!', 'damage');
    state.battleOver = true;
  }
}

function restart() {
  state.character = null;
  state.spells = ['antlift','heal'];
  document.getElementById('char-next').disabled = true;
  document.getElementById('spell-next').disabled = true;
  goTo('title');
}

// init
renderCharGrid();
</script>
