<title>Ultimate House Builder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:'Segoe UI',sans-serif;overflow:hidden;user-select:none}
#wrap{display:flex;height:100vh}

/* Sidebar */
#side{width:240px;background:#1a1a2e;border-right:2px solid #2a2a4e;display:flex;flex-direction:column;overflow:hidden}
#side-header{padding:10px;background:#0f0f2a;text-align:center;font-size:18px;font-weight:bold;letter-spacing:2px;color:#ff6b6b;border-bottom:2px solid #2a2a4e}
#search{width:100%;padding:8px 12px;background:#12122a;border:none;border-bottom:1px solid #2a2a4e;color:#ccc;font-size:13px;outline:none}
#search::placeholder{color:#555}
#item-list{flex:1;overflow-y:auto;overflow-x:hidden}
#item-list::-webkit-scrollbar{width:6px}
#item-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.cat{padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#ff6b6b;background:#12122a;position:sticky;top:0;z-index:1;border-bottom:1px solid #1e1e3e}
.itm{display:flex;align-items:center;gap:10px;padding:7px 14px;border:none;background:none;color:#aaa;font-size:12px;cursor:pointer;width:100%;text-align:left;border-left:3px solid transparent;transition:.1s}
.itm:hover{background:#20204a;color:#fff}
.itm.act{border-left-color:#ff6b6b;background:#20204a;color:#fff}
.itm canvas{border-radius:4px;background:#0a0a1e;flex-shrink:0}

/* Canvas */
#cv-wrap{flex:1;position:relative;overflow:hidden}
canvas#game{display:block;cursor:crosshair}

/* Toolbar */
#tb{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.95);border:1px solid #2a2a4e;border-radius:14px;padding:6px 14px;display:flex;gap:8px;align-items:center;z-index:20;backdrop-filter:blur(10px)}
.tb-btn{padding:5px 12px;background:#1a1a3a;border:1px solid #2a2a4e;border-radius:8px;color:#aaa;cursor:pointer;font-size:12px;transition:.12s}
.tb-btn:hover,.tb-btn.on{background:#ff6b6b;color:#fff;border-color:#ff6b6b}
.tb-sep{color:#333;font-size:14px}
#flr-lbl{color:#ff6b6b;font-weight:bold;font-size:13px;min-width:70px;text-align:center}

/* HUD */
#hud{position:fixed;top:10px;right:12px;background:rgba(20,20,40,.88);border:1px solid #2a2a4e;border-radius:10px;padding:8px 14px;font-size:11px;line-height:1.9;z-index:20}
#hud kbd{background:#2a2a4e;padding:1px 5px;border-radius:3px;font-size:10px}

/* Toast */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,107,107,.9);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .3s;z-index:100}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="wrap">
  <div id="side">
    <div id="side-header">HOUSE BUILDER</div>
    <input id="search" placeholder="Search items..." autocomplete="off">
    <div id="item-list"></div>
  </div>
  <div id="cv-wrap"><canvas id="game"></canvas></div>
</div>

<div id="tb">
  <button class="tb-btn on" data-t="place">Place</button>
  <button class="tb-btn" data-t="erase">Erase</button>
  <button class="tb-btn" data-t="pick">Pick</button>
  <span class="tb-sep">|</span>
  <button class="tb-btn" id="fd">&#9660;</button>
  <span id="flr-lbl">Floor 1</span>
  <button class="tb-btn" id="fu">&#9650;</button>
  <span class="tb-sep">|</span>
  <button class="tb-btn" id="undo">Undo</button>
  <button class="tb-btn" id="redo">Redo</button>
  <span class="tb-sep">|</span>
  <button class="tb-btn" id="save">Save</button>
  <button class="tb-btn" id="load">Load</button>
  <button class="tb-btn" id="clear">Clear</button>
</div>

<div id="hud">
  <kbd>R</kbd> Rotate &nbsp;<kbd>Scroll</kbd> Zoom &nbsp;<kbd>Right-drag</kbd> Pan<br>
  <kbd>E</kbd> Erase &nbsp;<kbd>Q</kbd> Pick &nbsp;<kbd>PgUp/Dn</kbd> Floor &nbsp;<kbd>Z</kbd> Undo
</div>

<div id="toast"></div>

// ===================== STATE =====================
const C=document.getElementById('game'),X=C.getContext('2d');
const CELL=40;
let world={},floor=0,sel=ITEMS[0],tool='place',rot=0;
let camX=0,camY=0,zoom=1;
let panning=false,panSX,panSY,camSX,camSY;
let painting=false,mgx=0,mgy=0;
let history=[],future=[];
const MAX_HIST=200;

function snap(){history.push(JSON.stringify(world));if(history.length>MAX_HIST)history.shift();future=[];}
function undo(){if(!history.length)return;future.push(JSON.stringify(world));world=JSON.parse(history.pop());}
function redo(){if(!future.length)return;history.push(JSON.stringify(world));world=JSON.parse(future.pop());}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200);}

// ===================== SIDEBAR =====================
function buildSidebar(filter=''){
  const list=document.getElementById('item-list');
  list.innerHTML='';
  let lastCat='';
  const f=filter.toLowerCase();
  ITEMS.forEach(item=>{
    if(f&&!item.name.toLowerCase().includes(f)&&!item.cat.toLowerCase().includes(f))return;
    if(item.cat!==lastCat){lastCat=item.cat;const d=document.createElement('div');d.className='cat';d.textContent=item.cat;list.appendChild(d);}
    const btn=document.createElement('button');
    btn.className='itm'+(sel.id===item.id?' act':'');
    // mini preview canvas
    const mc=document.createElement('canvas');mc.width=28;mc.height=28;
    const mx=mc.getContext('2d');
    drawItem(mx,item,0,0,28,28,0);
    btn.appendChild(mc);
    const sp=document.createElement('span');
    sp.textContent=item.name;
    if(item.w>1||item.h>1)sp.textContent+=` (${item.w}x${item.h})`;
    btn.appendChild(sp);
    btn.onclick=()=>{sel=item;tool='place';updateTool();buildSidebar(filter);};
    list.appendChild(btn);
  });
}

document.getElementById('search').addEventListener('input',e=>buildSidebar(e.target.value));

// ===================== TOOLBAR =====================
function updateTool(){document.querySelectorAll('.tb-btn[data-t]').forEach(b=>b.classList.toggle('on',b.dataset.t===tool));}
document.querySelectorAll('.tb-btn[data-t]').forEach(b=>b.onclick=()=>{tool=b.dataset.t;updateTool();});
document.getElementById('fu').onclick=()=>{floor++;updFlr();};
document.getElementById('fd').onclick=()=>{if(floor>0)floor--;updFlr();};
function updFlr(){document.getElementById('flr-lbl').textContent='Floor '+(floor+1);}
document.getElementById('undo').onclick=undo;
document.getElementById('redo').onclick=redo;
document.getElementById('save').onclick=()=>{localStorage.setItem('hb2',JSON.stringify(world));toast('Saved!');};
document.getElementById('load').onclick=()=>{const d=localStorage.getItem('hb2');if(d){snap();world=JSON.parse(d);toast('Loaded!');}};
document.getElementById('clear').onclick=()=>{snap();world={};toast('Cleared!');};

// ===================== INPUT =====================
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='r'||e.key==='R')rot=(rot+1)%4;
  if(e.key==='e'||e.key==='E'){tool='erase';updateTool();}
  if(e.key==='q'||e.key==='Q'){tool='pick';updateTool();}
  if(e.key==='z'||e.key==='Z')undo();
  if(e.key==='y'||e.key==='Y')redo();
  if(e.key==='PageUp'){floor++;updFlr();}
  if(e.key==='PageDown'){if(floor>0)floor--;updFlr();}
});

C.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.12:.89;zoom=Math.max(.2,Math.min(4,zoom*f));});

C.addEventListener('mousedown',e=>{
  if(e.button===2){panning=true;panSX=e.clientX;panSY=e.clientY;camSX=camX;camSY=camY;return;}
  if(e.button===0){
    painting=true;
    if(tool==='place'){snap();}
    if(tool==='erase'){snap();}
    doAction();
  }
});
C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect();
  const mx=(e.clientX-r.left-C.width/2)/zoom+camX;
  const my=(e.clientY-r.top-C.height/2)/zoom+camY;
  mgx=Math.floor(mx/CELL);mgy=Math.floor(my/CELL);
  if(panning){camX=camSX-(e.clientX-panSX)/zoom;camY=camSY-(e.clientY-panSY)/zoom;}
  if(painting)doAction();
});
C.addEventListener('mouseup',e=>{if(e.button===2)panning=false;painting=false;});
C.addEventListener('contextmenu',e=>e.preventDefault());

function dims(item,r){const sw=r%2===1;return{w:sw?item.h:item.w,h:sw?item.w:item.h};}

function doAction(){
  if(tool==='place')place(mgx,mgy);
  else if(tool==='erase')erase(mgx,mgy);
  else if(tool==='pick')pick(mgx,mgy);
}

function place(gx,gy){
  const d=dims(sel,rot);
  for(let dx=0;dx<d.w;dx++)for(let dy=0;dy<d.h;dy++){
    const k=`${floor}:${gx+dx}:${gy+dy}`;
    if(world[k])return;
  }
  for(let dx=0;dx<d.w;dx++)for(let dy=0;dy<d.h;dy++){
    world[`${floor}:${gx+dx}:${gy+dy}`]={id:sel.id,rot,ox:gx,oy:gy,isO:dx===0&&dy===0};
  }
}

function erase(gx,gy){
  const k=`${floor}:${gx}:${gy}`;
  const c=world[k];if(!c)return;
  const item=ITEMS.find(i=>i.id===c.id);if(!item){delete world[k];return;}
  const d=dims(item,c.rot);
  for(let dx=0;dx<d.w;dx++)for(let dy=0;dy<d.h;dy++)delete world[`${floor}:${c.ox+dx}:${c.oy+dy}`];
}

function pick(gx,gy){
  const k=`${floor}:${gx}:${gy}`;
  const c=world[k];if(!c)return;
  const item=ITEMS.find(i=>i.id===c.id);if(!item)return;
  sel=item;rot=c.rot;tool='place';updateTool();buildSidebar(document.getElementById('search').value);
  toast('Picked: '+item.name);
}

// ===================== DRAWING =====================
function drawItem(ctx,item,x,y,w,h,rot){
  ctx.save();
  ctx.translate(x+w/2,y+h/2);
  ctx.rotate(rot*Math.PI/2);
  ctx.translate(-w/2,-h/2);

  const id=item.id;
  const c=item.c;

  // Base shape
  ctx.fillStyle=c;

  // Category-specific drawing
  if(item.cat==='Foundation'||item.layer===0&&!id.includes('rug')&&!id.includes('mat')&&!id.includes('pool')&&!id.includes('sandbox')&&!id.includes('garden_bed')){
    drawFloorTile(ctx,id,w,h,c);
  } else if(item.cat==='Walls'){
    drawWall(ctx,id,w,h,c);
  } else if(item.cat==='Doors & Windows'){
    drawDoorWindow(ctx,id,w,h,c);
  } else if(item.cat==='Roof'){
    drawRoof(ctx,id,w,h,c);
  } else {
    drawGeneric(ctx,item,id,w,h,c);
  }

  ctx.restore();
}

function drawFloorTile(ctx,id,w,h,c){
  ctx.fillStyle=c;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=shadeColor(c,-.15);ctx.lineWidth=1;

  if(id==='wood_floor'||id==='deck'){
    for(let i=0;i<h;i+=h/4){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(w,i);ctx.stroke();}
    ctx.strokeStyle=shadeColor(c,-.08);
    ctx.beginPath();ctx.moveTo(w/3,0);ctx.lineTo(w/3,h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*2/3,0);ctx.lineTo(w*2/3,h);ctx.stroke();
  } else if(id==='tile_floor'||id==='patio'||id==='sidewalk'){
    ctx.strokeRect(0,0,w/2,h/2);ctx.strokeRect(w/2,0,w/2,h/2);
    ctx.strokeRect(0,h/2,w/2,h/2);ctx.strokeRect(w/2,h/2,w/2,h/2);
  } else if(id==='marble_floor'){
    ctx.strokeRect(0,0,w,h);
    ctx.fillStyle=shadeColor(c,.05);
    ctx.beginPath();ctx.moveTo(w*.2,0);ctx.lineTo(w*.6,h);ctx.lineTo(w*.4,h);ctx.lineTo(0,0);ctx.fill();
  } else if(id==='stone_floor'||id==='path_stone'){
    ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=shadeColor(c,-.2);ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(w*.4,0);ctx.lineTo(w*.3,h*.5);ctx.lineTo(0,h*.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*.7,0);ctx.lineTo(w*.6,h*.4);ctx.lineTo(w,h*.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*.2,h);ctx.lineTo(w*.5,h*.6);ctx.lineTo(w*.8,h);ctx.stroke();
  } else if(id==='carpet'||id==='bath_mat'||id==='welcome_mat'){
    rrect(ctx,2,2,w-4,h-4,4);ctx.fill();
    ctx.strokeStyle=shadeColor(c,.1);ctx.lineWidth=1;rrect(ctx,4,4,w-8,h-8,2);ctx.stroke();
  } else if(id==='path_brick'){
    ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=shadeColor(c,-.2);ctx.lineWidth=1;
    for(let r=0;r<h;r+=6){const off=(Math.floor(r/6)%2)*8;for(let col=off-8;col<w;col+=16)ctx.strokeRect(col,r,16,6);}
  } else if(id==='water'||id==='pool_water'){
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath();ctx.moveTo(0,h*.3);ctx.quadraticCurveTo(w*.25,h*.2,w*.5,h*.3);ctx.quadraticCurveTo(w*.75,h*.4,w,h*.3);ctx.lineTo(w,h*.4);ctx.quadraticCurveTo(w*.75,h*.5,w*.5,h*.4);ctx.quadraticCurveTo(w*.25,h*.3,0,h*.4);ctx.fill();
  } else if(id==='grass'){
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle=shadeColor(c,.1);
    for(let i=0;i<5;i++){const bx=w*(.1+Math.sin(i*3)*.3),by=h*(.2+Math.cos(i*2)*.3);ctx.fillRect(bx,by,2,6);}
  } else if(id==='driveway'){
    ctx.fillRect(0,0,w,h);ctx.strokeStyle=shadeColor(c,.1);ctx.lineWidth=1;ctx.strokeRect(0,0,w,h);
  } else if(id==='pool_edge'||id==='pool_corner'){
    ctx.fillStyle='#C8C8C8';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#38B0D8';ctx.fillRect(4,4,w-8,h-8);
  } else if(id.includes('rug')){
    rrect(ctx,2,2,w-4,h-4,6);ctx.fill();
    ctx.strokeStyle=shadeColor(c,.15);ctx.lineWidth=2;rrect(ctx,6,6,w-12,h-12,4);ctx.stroke();
    ctx.strokeStyle=shadeColor(c,-.1);rrect(ctx,10,10,w-20,h-20,2);ctx.stroke();
  } else if(id==='garden_bed'){
    ctx.fillStyle='#5E3E1A';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#6D4C2A';ctx.fillRect(2,2,w-4,h-4);
    ctx.fillStyle='#4CAF50';
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(w*(.2+i*.3),h*.4,4,0,Math.PI*2);ctx.fill();}
  } else if(id==='sandbox'){
    ctx.fillStyle='#C8A060';rrect(ctx,2,2,w-4,h-4,4);ctx.fill();
    ctx.strokeStyle='#A08040';ctx.lineWidth=3;rrect(ctx,2,2,w-4,h-4,4);ctx.stroke();
    ctx.fillStyle='#E0C880';ctx.beginPath();ctx.arc(w*.6,h*.5,w*.15,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillRect(0,0,w,h);ctx.strokeStyle=shadeColor(c,-.15);ctx.lineWidth=1;ctx.strokeRect(0,0,w,h);
  }
}

function drawWall(ctx,id,w,h,c){
  ctx.fillStyle=c;ctx.fillRect(0,0,w,h);
  if(id==='brick_wall'){
    ctx.strokeStyle=shadeColor(c,-.2);ctx.lineWidth=1;
    for(let r=0;r<h;r+=8){const off=(Math.floor(r/8)%2)*12;for(let col=off-12;col<w;col+=24)ctx.strokeRect(col,r,24,8);}
  } else if(id==='stone_wall'){
    ctx.strokeStyle=shadeColor(c,-.15);ctx.lineWidth=1.5;
    const stones=[[0,0,w*.45,h*.5],[w*.45,0,w*.55,h*.4],[0,h*.5,w*.55,h*.5],[w*.55,h*.4,w*.45,h*.6]];
    stones.forEach(s=>ctx.strokeRect(s[0],s[1],s[2],s[3]));
  } else if(id==='glass_wall'){
    ctx.globalAlpha=.6;ctx.fillRect(0,0,w,h);ctx.globalAlpha=1;
    ctx.strokeStyle='#80B0D0';ctx.lineWidth=2;ctx.strokeRect(1,1,w-2,h-2);
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(3,3,w*.3,h-6);
  } else if(id==='wood_wall'){
    for(let i=0;i<w;i+=w/4){ctx.fillStyle=i%(w/2)?shadeColor(c,.05):c;ctx.fillRect(i,0,w/4,h);}
    ctx.strokeStyle=shadeColor(c,-.2);ctx.lineWidth=1;
    for(let i=0;i<=w;i+=w/4){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke();}
  } else if(id==='half_wall'){
    ctx.fillRect(0,h*.4,w,h*.6);
    ctx.fillStyle=shadeColor(c,.1);ctx.fillRect(0,h*.4,w,4);
  } else if(id==='pillar'){
    ctx.fillStyle=shadeColor(c,.05);ctx.fillRect(w*.2,0,w*.6,h);
    ctx.fillStyle=c;ctx.fillRect(w*.15,0,w*.7,6);ctx.fillRect(w*.15,h-6,w*.7,6);
    ctx.strokeStyle=shadeColor(c,-.1);ctx.lineWidth=1;ctx.strokeRect(w*.2,0,w*.6,h);
  } else if(id==='arch'){
    ctx.fillRect(0,0,w*.25,h);ctx.fillRect(w*.75,0,w*.25,h);
    ctx.beginPath();ctx.arc(w/2,h*.35,w*.25,Math.PI,0);ctx.lineTo(w*.75,0);ctx.lineTo(w*.25,0);ctx.fill();
  } else {
    ctx.strokeStyle=shadeColor(c,-.15);ctx.lineWidth=1;ctx.strokeRect(0,0,w,h);
  }
}

function drawDoorWindow(ctx,id,w,h,c){
  if(id.includes('door')){
    if(id==='sliding_door'){
      ctx.fillStyle='#D0D0D0';ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#88C8E8';ctx.globalAlpha=.6;ctx.fillRect(3,3,w/2-2,h-6);ctx.fillRect(w/2+1,3,w/2-4,h-6);ctx.globalAlpha=1;
      ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.strokeRect(0,0,w,h);
      ctx.fillStyle='#888';ctx.fillRect(w/2-1,0,2,h);
    } else {
      ctx.fillStyle=c;ctx.fillRect(4,0,w-8,h);
      ctx.strokeStyle=shadeColor(c,-.2);ctx.lineWidth=2;ctx.strokeRect(4,0,w-8,h);
      if(id==='double_door'){
        ctx.strokeRect(6,4,w/2-8,h-8);ctx.strokeRect(w/2+2,4,w/2-8,h-8);
        ctx.fillStyle='#D4AF37';
        ctx.beginPath();ctx.arc(w/2-6,h/2,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(w/2+6,h/2,2.5,0,Math.PI*2);ctx.fill();
      } else {
        ctx.strokeRect(8,4,w-16,h*.4-4);ctx.strokeRect(8,h*.4+2,w-16,h*.55);
        ctx.fillStyle=id==='front_door'?'#D4AF37':'#C8A040';
        ctx.beginPath();ctx.arc(w-14,h/2,3,0,Math.PI*2);ctx.fill();
        if(id==='front_door'){
          // peephole
          ctx.fillStyle='#333';ctx.beginPath();ctx.arc(w/2,h*.2,2,0,Math.PI*2);ctx.fill();
        }
      }
    }
  } else {
    // Windows
    ctx.fillStyle='#8B7355';ctx.fillRect(0,0,w,h);
    const p=4;
    ctx.fillStyle='#88C8E8';ctx.fillRect(p,p,w-p*2,h-p*2);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(p,p,w-p*2,h-p*2);
    if(id==='window_sm'){
      ctx.beginPath();ctx.moveTo(w/2,p);ctx.lineTo(w/2,h-p);ctx.stroke();
      ctx.beginPath();ctx.moveTo(p,h/2);ctx.lineTo(w-p,h/2);ctx.stroke();
    } else if(id==='window_lg'||id==='bay_window'){
      ctx.beginPath();ctx.moveTo(w*.33,p);ctx.lineTo(w*.33,h-p);ctx.stroke();
      ctx.beginPath();ctx.moveTo(w*.66,p);ctx.lineTo(w*.66,h-p);ctx.stroke();
      ctx.beginPath();ctx.moveTo(p,h/2);ctx.lineTo(w-p,h/2);ctx.stroke();
      if(id==='bay_window'){
        ctx.fillStyle='rgba(135,206,235,.3)';ctx.fillRect(p,h-p-6,w-p*2,6);
      }
    } else if(id==='skylight'){
      ctx.fillStyle='#A0D8F0';ctx.fillRect(p,p,w-p*2,h-p*2);
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(p+2,p+2,w*.3,h-p*2-4);
    }
  }
}

function drawRoof(ctx,id,w,h,c){
  if(id==='roof_tile'){
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(0,h);ctx.lineTo(w/2,2);ctx.lineTo(w,h);ctx.closePath();ctx.fill();
    ctx.strokeStyle=shadeColor(c,-.15);ctx.lineWidth=1;

function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function shadeColor(col,pct){
  let r=parseInt(col.substring(1,3),16),g=parseInt(col.substring(3,5),16),b=parseInt(col.substring(5,7),16);
  r=Math.min(255,Math.max(0,Math.round(r*(1+pct))));g=Math.min(255,Math.max(0,Math.round(g*(1+pct))));b=Math.min(255,Math.max(0,Math.round(b*(1+pct))));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}

// ===================== RENDER =====================
function resize(){C.width=C.parentElement.clientWidth;C.height=C.parentElement.clientHeight;}
window.addEventListener('resize',resize);resize();

function render(){
  X.clearRect(0,0,C.width,C.height);
  X.save();
  X.translate(C.width/2,C.height/2);
  X.scale(zoom,zoom);
  X.translate(-camX,-camY);

  const sx=Math.floor((camX-C.width/2/zoom)/CELL)-1;
  const sy=Math.floor((camY-C.height/2/zoom)/CELL)-1;
  const ex=Math.ceil((camX+C.width/2/zoom)/CELL)+1;
  const ey=Math.ceil((camY+C.height/2/zoom)/CELL)+1;

  // Background
  X.fillStyle='#2a4a20';
  X.fillRect(sx*CELL,sy*CELL,(ex-sx)*CELL,(ey-sy)*CELL);

  // Grid
  X.strokeStyle='rgba(255,255,255,.05)';X.lineWidth=1;
  for(let gx=sx;gx<=ex;gx++){X.beginPath();X.moveTo(gx*CELL,sy*CELL);X.lineTo(gx*CELL,ey*CELL);X.stroke();}
  for(let gy=sy;gy<=ey;gy++){X.beginPath();X.moveTo(sx*CELL,gy*CELL);X.lineTo(ex*CELL,gy*CELL);X.stroke();}

  // Below floor ghost
  if(floor>0){X.globalAlpha=.18;drawFloor(floor-1,sx,sy,ex,ey);X.globalAlpha=1;}

  // Current floor by layer
  for(let layer=0;layer<=2;layer++)drawFloor(floor,sx,sy,ex,ey,layer);

  // Ghost preview
  if(tool==='place'){
    const d=dims(sel,rot);
    const px=mgx*CELL,py=mgy*CELL,pw=d.w*CELL,ph=d.h*CELL;
    let can=true;
    for(let dx=0;dx<d.w;dx++)for(let dy=0;dy<d.h;dy++)if(world[`${floor}:${mgx+dx}:${mgy+dy}`])can=false;
    X.globalAlpha=.55;
    drawItem(X,sel,px,py,pw,ph,rot);
    X.globalAlpha=1;
    X.strokeStyle=can?'#4f4':'#f44';X.lineWidth=2;X.strokeRect(px,py,pw,ph);
  } else if(tool==='erase'){
    X.strokeStyle='#f44';X.lineWidth=2;X.setLineDash([4,4]);X.strokeRect(mgx*CELL,mgy*CELL,CELL,CELL);X.setLineDash([]);
  } else if(tool==='pick'){
    X.strokeStyle='#ff0';X.lineWidth=2;X.setLineDash([4,4]);X.strokeRect(mgx*CELL,mgy*CELL,CELL,CELL);X.setLineDash([]);
  }

  X.restore();
  requestAnimationFrame(render);
}

function drawFloor(f,sx,sy,ex,ey,targetLayer){
  const drawn=new Set();
  for(let gx=sx;gx<=ex;gx++)for(let gy=sy;gy<=ey;gy++){
    const k=`${f}:${gx}:${gy}`;
    const c=world[k];if(!c||!c.isO)continue;
    const ok=`${c.ox}:${c.oy}`;if(drawn.has(ok))continue;
    const item=ITEMS.find(i=>i.id===c.id);if(!item)continue;
    if(targetLayer!==undefined&&item.layer!==targetLayer)continue;
    drawn.add(ok);
    const d=dims(item,c.rot);
    drawItem(X,item,c.ox*CELL,c.oy*CELL,d.w*CELL,d.h*CELL,c.rot);
  }
}

<script>/* gamepad-bridge */(function(){if(!navigator.getGamepads)return;var st={};function K(t,k,c,kc){window.dispatchEvent(new KeyboardEvent(t,{key:k,code:c,keyCode:kc,which:kc,bubbles:true}));}function set(id,dn,k,c,kc){if(dn&&!st[id]){st[id]=1;K("keydown",k,c,kc);}else if(!dn&&st[id]){st[id]=0;K("keyup",k,c,kc);}}function bd(p,i){return p.buttons[i]&&p.buttons[i].pressed;}function loop(){var ps=navigator.getGamepads();for(var i=0;i<ps.length;i++){var p=ps[i];if(!p)continue;var x=p.axes[0]||0,y=p.axes[1]||0;set("L",x<-.5||bd(p,14),"ArrowLeft","ArrowLeft",37);set("R",x>.5||bd(p,15),"ArrowRight","ArrowRight",39);set("U",y<-.5||bd(p,12),"ArrowUp","ArrowUp",38);set("D",y>.5||bd(p,13),"ArrowDown","ArrowDown",40);set("Asp",bd(p,0)," ","Space",32);set("Aen",bd(p,0),"Enter","Enter",13);set("Bsh",bd(p,1),"Shift","ShiftLeft",16);break;}requestAnimationFrame(loop);}requestAnimationFrame(loop);})();</script>
