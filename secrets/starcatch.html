<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Catcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at top,#10173a,#05050f 70%);color:#fff;
  font-family:'Courier New',monospace;height:100vh;overflow:hidden;cursor:none}
h1{position:absolute;top:16px;left:0;right:0;text-align:center;font-size:28px;letter-spacing:5px;
  color:#ffe680;text-shadow:0 0 20px rgba(255,230,128,.6);z-index:3;pointer-events:none}
.back{position:absolute;top:18px;right:20px;color:#9ab;text-decoration:none;font-size:12px;
  letter-spacing:2px;z-index:5;cursor:pointer}
.back:hover{color:#fff}
#hud{position:absolute;top:54px;left:0;right:0;text-align:center;letter-spacing:3px;z-index:3;
  font-size:15px;color:#cfe;pointer-events:none}
#hud b{color:#ffe680}
#cv{position:absolute;inset:0;z-index:1}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bgstar{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.2}50%{opacity:1}}
#over{position:absolute;inset:0;z-index:4;display:none;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(5,5,15,.85);text-align:center}
#over.show{display:flex}
#over h2{font-size:42px;color:#ffe680;letter-spacing:4px;margin-bottom:10px;text-shadow:0 0 30px rgba(255,230,128,.6)}
#over p{font-size:18px;color:#cfe;margin-bottom:24px;letter-spacing:2px}
#again{font-family:'Courier New',monospace;font-size:16px;font-weight:700;letter-spacing:3px;
  padding:14px 34px;border:0;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000}
#again:hover{box-shadow:0 0 30px rgba(255,180,0,.7)}
</style></head><body>

<div id="bg"></div>
<h1>🌟 STAR CATCHER 🌟</h1>
<a class="back" href="../index.html">← back</a>
<div id="hud">SCORE <b id="score">0</b> &nbsp;·&nbsp; BEST <b id="best">0</b> &nbsp;·&nbsp; LIVES <b id="lives">★★★</b></div>
<canvas id="cv"></canvas>

<div id="over">
  <h2>GAME OVER</h2>
  <p>You caught <b id="finalScore">0</b> stars.</p>
  <button id="again">▶ PLAY AGAIN</button>
</div>

<script>
// twinkling background
const bg = document.getElementById('bg');
for(let i=0;i<90;i++){const s=document.createElement('div');s.className='bgstar';
  const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  bg.appendChild(s);}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}resize();addEventListener('resize',resize);

const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),
      livesEl=document.getElementById('lives'),overEl=document.getElementById('over'),
      finalEl=document.getElementById('finalScore');

let basketX=innerWidth/2, score=0, lives=3, stars=[], spawnTimer=0, spawnEvery=70,
    speedMul=1, running=true, best=+(localStorage.getItem('starcatch_best')||0);
bestEl.textContent=best;

addEventListener('mousemove',e=>basketX=e.clientX);
addEventListener('touchmove',e=>{if(e.touches[0])basketX=e.touches[0].clientX;},{passive:true});

const STAR_CHARS=['⭐','🌟','✨','💫'];
function spawnStar(){
  const bad=Math.random()<0.12; // a few "bombs"
  stars.push({x:40+Math.random()*(W-80),y:-30,
    vy:(2+Math.random()*2)*speedMul,
    char: bad?'☄️':STAR_CHARS[Math.floor(Math.random()*STAR_CHARS.length)],
    bad, r:18, spin:(Math.random()-0.5)*0.2, ang:0});
}

const basketY=()=>H-60, basketW=110;
function loop(){
  if(!running)return;
  ctx.clearRect(0,0,W,H);
  // spawn
  if(++spawnTimer>=spawnEvery){spawnTimer=0;spawnStar();
    if(spawnEvery>28)spawnEvery-=0.4; speedMul+=0.004;}
  // basket
  const bx=Math.max(basketW/2,Math.min(W-basketW/2,basketX));
  ctx.font='44px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🧺',bx,basketY()+10);
  // stars
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];s.y+=s.vy;s.ang+=s.spin;
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.ang);ctx.font='30px serif';
    ctx.fillText(s.char,0,0);ctx.restore();
    // catch?
    if(s.y>=basketY()-14 && s.y<=basketY()+30 && Math.abs(s.x-bx)<basketW/2){
      if(s.bad){lives=0;updateLives();endGame();return;}
      score++;scoreEl.textContent=score;stars.splice(i,1);continue;
    }
    // missed (off bottom)
    if(s.y>H+30){
      stars.splice(i,1);
      if(!s.bad){lives--;updateLives();if(lives<=0){endGame();return;}}
    }
  }
  requestAnimationFrame(loop);
}
function updateLives(){livesEl.textContent='★'.repeat(Math.max(0,lives))||'—';}
function endGame(){
  running=false;
  if(score>best){best=score;localStorage.setItem('starcatch_best',best);bestEl.textContent=best;}
  finalEl.textContent=score;overEl.classList.add('show');
}
function start(){
  score=0;lives=3;stars=[];spawnTimer=0;spawnEvery=70;speedMul=1;running=true;
  scoreEl.textContent=0;updateLives();overEl.classList.remove('show');
  requestAnimationFrame(loop);
}
document.getElementById('again').addEventListener('click',start);
start();
</script></body></html>
