<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>Join The Cult</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle at 50% 50%,#3a0000,#0a0000 80%);color:#f55;font-family:'Courier New',monospace;
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
h1{font-size:36px;letter-spacing:8px;color:#ff3333;text-shadow:0 0 20px #f00;margin-bottom:8px;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{text-shadow:0 0 20px #f00}50%{text-shadow:0 0 40px #f00,0 0 60px #f00}}
.sub{font-size:12px;color:#aa5555;letter-spacing:4px;margin-bottom:30px}
#circle{position:relative;width:340px;height:340px;border:2px solid #500;border-radius:50%;
  margin-bottom:20px;animation:spin 30s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.robe{position:absolute;font-size:50px;animation:counterspin 30s linear infinite}
@keyframes counterspin{to{transform:rotate(-360deg)}}
#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;
  animation:flame 1s ease-in-out infinite alternate}
@keyframes flame{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(1.2)}}
button{font-family:inherit;font-size:18px;padding:12px 24px;background:#500;color:#fcc;
  border:2px solid #800;cursor:pointer;letter-spacing:3px;margin-top:10px}
button:hover{background:#800}
#msg{margin-top:14px;font-size:14px;color:#fcc;letter-spacing:2px;max-width:400px;text-align:center}
.back{position:absolute;top:20px;right:20px;color:#600;text-decoration:none;font-size:12px;letter-spacing:2px}
</style></head><body>
<a class="back" href="../index.html">← back</a>
<h1>JOIN THE CULT</h1>
<div class="sub">~ membership is forever ~</div>
<div id="circle">
  <div id="center">🔥</div>
</div>
<button onclick="chant()">CHANT</button>
<div id="msg">Click CHANT to join us.</div>
<script>
const circle = document.getElementById('circle');
const positions = [0, 60, 120, 180, 240, 300];
positions.forEach((deg, i) => {
  const r = document.createElement('div');
  r.className = 'robe';
  r.textContent = '🧝';
  r.style.left = (50 + 47 * Math.cos(deg * Math.PI / 180)) + '%';
  r.style.top  = (50 + 47 * Math.sin(deg * Math.PI / 180)) + '%';
  r.style.transform = 'translate(-50%,-50%)';
  r.style.animationDelay = (-i * 5) + 's';
  circle.appendChild(r);
});
let n = 0;
const LINES = ['hail.','one of us.','one of us.','soon.','the fire is hungry.',
  'do not look at the sky tonight.','you are doing great.','keep going.','the prophecy unfolds.'];
function chant() {
  n++;
  document.getElementById('msg').textContent = `${LINES[Math.floor(Math.random()*LINES.length)]} (chants: ${n})`;
  if (n === 13) document.getElementById('msg').textContent = '🎉 YOU ARE NOW THE LEADER. Congratulations or whatever.';
}
</script></body></html>
