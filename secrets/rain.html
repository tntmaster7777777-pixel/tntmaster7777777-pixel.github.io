<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Rainbow Rain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;
  height:100vh;overflow:hidden;cursor:crosshair;transition:background .4s,color .4s}
h1{position:absolute;top:80px;left:0;right:0;text-align:center;font-size:30px;letter-spacing:6px;z-index:2;
  background:linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#00ffff,#0088ff,#ff00ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;
  animation:hue 2s linear infinite;transition:all .4s}
@keyframes hue{from{background-position:0}to{background-position:200%}}

/* Drops */
.drop{position:absolute;animation:fall var(--dur) linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh)}}
.drop.up{animation:rise var(--dur) linear forwards}
@keyframes rise{to{transform:translateY(-110vh)}}

.back{position:absolute;top:20px;right:20px;color:#aaa;text-decoration:none;font-size:12px;letter-spacing:2px;z-index:5}

/* Version switcher — horizontally scrollable */
#vBar{position:fixed;top:15px;left:60px;right:140px;z-index:5;
  background:rgba(0,0,0,.5);padding:5px;border-radius:24px;
  border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);
  overflow-x:auto;overflow-y:hidden;white-space:nowrap;scrollbar-width:thin}
#vBar::-webkit-scrollbar{height:4px}
#vBar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:2px}
.vbtn{font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;
  padding:5px 10px;border-radius:18px;border:0;cursor:pointer;
  background:transparent;color:#888;transition:all .2s;font-weight:700;
  display:inline-block;margin-right:2px}
.vbtn:hover{color:#fff;background:rgba(255,255,255,.1)}
.vbtn.active{background:#fff;color:#000}

#counter{position:fixed;top:18px;left:14px;font-size:10px;color:#888;z-index:6;letter-spacing:1px}

/* ===== THEME BACKGROUNDS ===== */
body.retro    {background:#001100;color:#0f0}
body.paper    {background:#f8f8f0;color:#222}
body.void     {background:#000;color:#222}
body.food     {background:linear-gradient(180deg,#fff5e0,#ffd4a0);color:#5a2f00}
body.fire     {background:linear-gradient(180deg,#3a0000,#8a0000);color:#ffaa00}
body.ice      {background:linear-gradient(180deg,#0a1a3a,#2a4a8a);color:#cce6ff}
body.money    {background:linear-gradient(180deg,#0a3a0a,#1a5a1a);color:#88ff88}
body.love     {background:linear-gradient(180deg,#3a0a2a,#8a2050);color:#ffaadd}
body.stars2   {background:#000;color:#ffe680}
body.bugs     {background:linear-gradient(180deg,#3a2a00,#5a4400);color:#ffcc88}
body.fish     {background:linear-gradient(180deg,#003a5a,#0066aa);color:#aaffff}
body.flowers  {background:linear-gradient(180deg,#f8c8e0,#f0a8c8);color:#5a1f40}
body.spooky   {background:#0a0a14;color:#aaaaff}
body.gems     {background:linear-gradient(180deg,#1a0a3a,#3a1a6a);color:#ff88ff}
body.lightning{background:linear-gradient(180deg,#0a0a1a,#1a1a3a);color:#ffff88}
body.autumn   {background:linear-gradient(180deg,#3a2a0a,#6a4a1a);color:#ffaa55}
body.music    {background:linear-gradient(180deg,#1a0a3a,#2a1a5a);color:#ff66cc}
body.emoji    {background:linear-gradient(180deg,#1a1a3a,#3a3a6a);color:#ffffff}
body.pixel    {background:#000;color:#0f0}
body.magic    {background:linear-gradient(180deg,#1a0033,#3a0066);color:#ffccff}
body.alien    {background:linear-gradient(180deg,#001a00,#003a00);color:#88ff88}
body.balloons {background:linear-gradient(180deg,#aaccff,#ddeeff);color:#1a4080}
body.bubbles  {background:linear-gradient(180deg,#003a5a,#0a5a8a);color:#aaeeff}
body.tools    {background:linear-gradient(180deg,#2a2a2a,#444);color:#ccc}

body.retro h1, body.paper h1, body.void h1, body.spooky h1, body.pixel h1, body.alien h1
  {background:none !important;-webkit-text-fill-color:currentColor !important;color:currentColor !important;animation:none !important;text-shadow:0 0 10px currentColor}

body.retro::before{content:'';position:fixed;inset:0;z-index:4;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.2) 0 2px,transparent 2px 4px)}

body.paper .vbtn.active{background:#222;color:#fff}
body.paper #vBar{background:rgba(255,255,255,.8);border-color:#ccc}
body.paper #counter{color:#666}

</style></head><body>
<a class="back" href="../index.html">← back</a>
<div id="counter">25 themes</div>
<div id="vBar"></div>
<h1>🌈 RAINBOW RAIN 🌈</h1>

<script>
const rainbowColors = ['#ff0000','#ff8800','#ffff00','#00ff00','#00ffff','#0088ff','#ff00ff'];
const matrixChars = '0123456789!@#$%^&*()_+ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// Helper: makes a basic streak drop with given color
function streak(d, color, w=4, hMin=10, hMax=30, glow=true) {
  d.style.width = w + 'px';
  d.style.height = (hMin + Math.random()*hMax) + 'px';
  d.style.borderRadius = (w/2) + 'px';
  d.style.background = color;
  if (glow) d.style.boxShadow = `0 0 8px ${color}`;
}
// Helper: makes an emoji/text drop
function symbol(d, char, sizeMin=24, sizeMax=42, dur=null) {
  d.style.fontSize = (sizeMin + Math.random()*(sizeMax-sizeMin)) + 'px';
  d.textContent = char;
  if (dur) d.style.setProperty('--dur', dur + 's');
}
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

const THEMES = {
  normal: { label: '🌈 NORMAL', drop: d => streak(d, rand(rainbowColors)) },
  retro:  { label: '▣ RETRO',   drop: d => {
    d.style.color = '#0f0'; d.style.fontFamily = '"Courier New",monospace';
    d.style.fontSize = (12 + Math.random()*8) + 'px';
    d.style.textShadow = '0 0 8px #0f0'; d.style.letterSpacing = '2px';
    let s = ''; const len = 5 + Math.floor(Math.random()*15);
    for (let i = 0; i < len; i++) s += matrixChars[Math.floor(Math.random()*matrixChars.length)] + '<br>';
    d.innerHTML = s;
  }},
  paper:  { label: '📄 PAPER', drop: d => { streak(d, '#222', 3, 8, 20, false); d.style.opacity = (0.5 + Math.random()*0.5); }},
  void:   { label: '∞ VOID',   drop: d => { streak(d, '#fff', 2, 15, 25); d.style.opacity = (0.3 + Math.random()*0.6); }},
  food:   { label: '🍕 FOOD',  drop: d => symbol(d, rand(['🍕','🍔','🌮','🍣','🍩','🍪','🍎','🍌','🍇','🍉','🥑','🥕','🍞','🧀','🥖','🍗','🍦','🥨','🥐','🍱'])) },
  fire:   { label: '🔥 FIRE',  drop: d => symbol(d, rand(['🔥','🔥','🔥','💥','🌶']), 20, 50) },
  ice:    { label: '❄ ICE',    drop: d => symbol(d, rand(['❄','❄','❄','🌨','💎']), 18, 36) },
  money:  { label: '💰 MONEY', drop: d => symbol(d, rand(['💵','💰','💸','🪙','💲','💴','💶','💷']), 22, 40) },
  love:   { label: '❤ LOVE',   drop: d => symbol(d, rand(['❤','💕','💖','💗','💓','💝','💘','💞','💟']), 18, 38) },
  stars2: { label: '⭐ STARS',  drop: d => symbol(d, rand(['⭐','✨','🌟','💫','⭐']), 16, 36) },
  bugs:   { label: '🐛 BUGS',  drop: d => symbol(d, rand(['🐛','🐞','🦋','🐜','🕷','🦗','🐌','🪲','🪳','🦂']), 22, 40) },
  fish:   { label: '🐟 FISH',  drop: d => symbol(d, rand(['🐟','🐠','🐡','🦈','🐬','🐳','🦑','🐙','🦐','🦞']), 24, 44) },
  flowers:{ label: '🌸 FLOWERS',drop: d => symbol(d, rand(['🌸','🌺','🌻','🌷','🌹','💐','🥀','🏵','🌼']), 22, 40) },
  spooky: { label: '💀 SPOOKY',drop: d => symbol(d, rand(['💀','☠','👻','🦇','🕸','🕷','⚰','🎃']), 24, 44) },
  gems:   { label: '💎 GEMS',  drop: d => symbol(d, rand(['💎','🔮','💍','📿','👑']), 22, 40) },
  lightning:{label:'⚡ LIGHTNING',drop: d => symbol(d, rand(['⚡','⚡','⚡','🌩']), 24, 50, 0.6 + Math.random()*0.6) },
  autumn: { label: '🍂 AUTUMN',drop: d => symbol(d, rand(['🍂','🍁','🍃','🌰']), 20, 38) },
  music:  { label: '🎵 MUSIC', drop: d => symbol(d, rand(['🎵','🎶','♪','♫','🎼','🎹','🎺','🎸']), 22, 40) },
  emoji:  { label: '🎲 EMOJI', drop: d => {
    const all = ['😂','😎','🤔','😴','🤯','🥶','🤠','😈','🤡','💩','🌈','🦄','🍕','🐱','⚽','🎮','🪐','🌙','👽','🦖'];
    symbol(d, rand(all), 20, 40);
  }},
  pixel:  { label: '▦ PIXEL', drop: d => {
    const c = rand(rainbowColors);
    const s = 8 + Math.floor(Math.random()*4)*4;
    d.style.width = s + 'px'; d.style.height = s + 'px';
    d.style.background = c; d.style.imageRendering = 'pixelated';
    d.style.boxShadow = `2px 2px 0 ${c}88`;
  }},
  magic:  { label: '✨ MAGIC', drop: d => symbol(d, rand(['✨','🪄','🔮','🌟','💫','⭐']), 20, 40) },
  alien:  { label: '👽 ALIEN', drop: d => symbol(d, rand(['👽','🛸','👾','🪐','🌌','⭐']), 24, 44) },
  balloons:{label: '🎈 BALLOONS', drop: d => { symbol(d, rand(['🎈','🎈','🎀']), 28, 48, 3 + Math.random()*3); d.classList.add('up'); }},
  bubbles:{ label: '🫧 BUBBLES',  drop: d => { symbol(d, '🫧', 22, 48, 3 + Math.random()*4); d.classList.add('up'); }},
  tools:  { label: '🔧 TOOLS', drop: d => symbol(d, rand(['🔧','🔨','🪛','⚙','🪚','⛏','🛠','🔩','🪓']), 24, 42) },
};

// Build the version bar
const vBar = document.getElementById('vBar');
for (const key in THEMES) {
  const b = document.createElement('button');
  b.className = 'vbtn'; b.dataset.v = key; b.textContent = THEMES[key].label;
  b.addEventListener('click', () => setTheme(key));
  vBar.appendChild(b);
}
document.getElementById('counter').textContent = Object.keys(THEMES).length + ' themes';

let theme = 'normal';
function makeDrop(x) {
  const d = document.createElement('div'); d.className = 'drop';
  d.style.left = (x ?? Math.random()*innerWidth) + 'px';
  d.style.top = '-40px';
  d.style.setProperty('--dur', (1 + Math.random()*2) + 's');
  THEMES[theme].drop(d);
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 6000);
}

setInterval(() => { for (let i = 0; i < 3; i++) makeDrop(); }, 100);
document.body.addEventListener('mousemove', e => { if (!e.target.closest('#vBar')) makeDrop(e.clientX); });

function setTheme(t) {
  theme = t;
  // Remove all theme classes
  Object.keys(THEMES).forEach(k => k !== 'normal' && document.body.classList.remove(k));
  if (t !== 'normal') document.body.classList.add(t);
  document.querySelectorAll('.vbtn').forEach(b =>
    b.classList.toggle('active', b.dataset.v === t));
  localStorage.setItem('rain_theme', t);
}
setTheme(localStorage.getItem('rain_theme') || 'normal');
</script></body></html>
