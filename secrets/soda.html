<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>Soda Shake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#fff5e0,#ffd0a0);color:#552;font-family:'Courier New',monospace;
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
h1{font-size:28px;letter-spacing:4px;margin-bottom:30px}
#can{width:140px;height:240px;background:linear-gradient(180deg,#c00,#900);
  border-radius:14px 14px 8px 8px;border:4px solid #500;position:relative;cursor:pointer;
  box-shadow:inset -20px 0 30px rgba(0,0,0,.4);transition:transform .05s}
#can::before{content:'COLA';position:absolute;top:40%;left:0;right:0;text-align:center;
  font-size:24px;color:#fff;letter-spacing:4px}
#can::after{content:'';position:absolute;top:0;left:0;right:0;height:14px;background:#888;
  border-radius:10px 10px 0 0;border-bottom:3px solid #555}
.bar{margin-top:30px;width:300px;height:30px;background:#eee;border:3px solid #000;border-radius:6px;overflow:hidden}
#fill{height:100%;width:0;background:linear-gradient(90deg,#0c0,#fc0,#f00);transition:width .1s}
.label{margin-top:10px;font-size:13px;color:#852}
.boom{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  font-size:120px;animation:boom 1s forwards}
@keyframes boom{0%{transform:scale(0)}100%{transform:scale(8);opacity:0}}
.back{position:absolute;top:20px;right:20px;color:#852;text-decoration:none;font-size:12px;letter-spacing:2px}
</style></head><body>
<a class="back" href="../index.html">← back</a>
<h1>🥤 SHAKE THE CAN 🥤</h1>
<div id="can"></div>
<div class="bar"><div id="fill"></div></div>
<div class="label" id="lbl">Click the can to shake it.</div>
<div class="boom" id="boom">💥</div>
<script>
const can = document.getElementById('can'), fill = document.getElementById('fill');
let level = 0, exploded = false;
can.onclick = () => {
  if (exploded) return;
  level = Math.min(100, level + 5);
  fill.style.width = level + '%';
  can.style.transform = `rotate(${(Math.random()-0.5)*20}deg) scale(${1 + level*0.005})`;
  setTimeout(() => can.style.transform = '', 80);
  if (level < 30) document.getElementById('lbl').textContent = 'shake shake shake';
  else if (level < 70) document.getElementById('lbl').textContent = 'getting fizzy';
  else if (level < 100) document.getElementById('lbl').textContent = 'this is a bad idea';
  if (level === 100 && !exploded) {
    exploded = true;
    document.getElementById('lbl').textContent = '💥 IT EXPLODED. YOUR KITCHEN IS RUINED.';
    document.getElementById('boom').style.display='flex';
    can.style.display='none';
  }
};
</script>
<!-- +marker+: if Fullscreen Forever is on in the vault, go fullscreen on first tap -->
<script>(function(){try{if(localStorage.getItem("fsForever")==="1"){var go=function(){var el=document.documentElement,r=el.requestFullscreen||el.webkitRequestFullscreen;if(r){try{var p=r.call(el);if(p&&p.catch)p.catch(function(){});}catch(e){}}window.removeEventListener("click",go);window.removeEventListener("touchend",go);};window.addEventListener("click",go);window.addEventListener("touchend",go,{passive:true});}}catch(e){}})();</script>

<script>/* gamepad-bridge */(function(){if(!navigator.getGamepads)return;var st={};function K(t,k,c,kc){window.dispatchEvent(new KeyboardEvent(t,{key:k,code:c,keyCode:kc,which:kc,bubbles:true}));}function set(id,dn,k,c,kc){if(dn&&!st[id]){st[id]=1;K("keydown",k,c,kc);}else if(!dn&&st[id]){st[id]=0;K("keyup",k,c,kc);}}function bd(p,i){return p.buttons[i]&&p.buttons[i].pressed;}function loop(){var ps=navigator.getGamepads();for(var i=0;i<ps.length;i++){var p=ps[i];if(!p)continue;var x=p.axes[0]||0,y=p.axes[1]||0;set("L",x<-.5||bd(p,14),"ArrowLeft","ArrowLeft",37);set("R",x>.5||bd(p,15),"ArrowRight","ArrowRight",39);set("U",y<-.5||bd(p,12),"ArrowUp","ArrowUp",38);set("D",y>.5||bd(p,13),"ArrowDown","ArrowDown",40);set("Asp",bd(p,0)," ","Space",32);set("Aen",bd(p,0),"Enter","Enter",13);set("Bsh",bd(p,1),"Shift","ShiftLeft",16);break;}requestAnimationFrame(loop);}requestAnimationFrame(loop);})();</script>
</body></html>
