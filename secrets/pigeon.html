<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>Pigeon Feeding</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#7cb9e8 0% 60%,#7aa55a 60% 100%);color:#fff;
  font-family:'Courier New',monospace;height:100vh;overflow:hidden;cursor:crosshair}
h1{position:absolute;top:20px;left:0;right:0;text-align:center;font-size:28px;letter-spacing:4px;
  color:#fff;text-shadow:2px 2px 0 #000}
.back{position:absolute;top:20px;right:20px;color:#fff;text-decoration:none;font-size:12px;letter-spacing:2px;text-shadow:1px 1px 0 #000}
#hud{position:absolute;bottom:20px;left:0;right:0;text-align:center;text-shadow:2px 2px 0 #000;letter-spacing:3px}
.crumb{position:absolute;font-size:24px;pointer-events:none;animation:land .6s ease-in forwards}
@keyframes land{from{transform:translateY(-100vh) rotate(0)}to{transform:translateY(0) rotate(360deg)}}
.pigeon{position:absolute;font-size:30px;transition:left .8s cubic-bezier(.2,.8,.2,1), top .8s cubic-bezier(.2,.8,.2,1);
  user-select:none}
.pigeon.eating{animation:bob .3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style></head><body>
<h1>🐦 PIGEON FEEDING SIMULATOR 🐦</h1>
<a class="back" href="../index.html">← back</a>
<div id="hud">Click to throw bread. Crumbs: <span id="n">0</span></div>
<script>
const pigeons = [];
for (let i = 0; i < 8; i++) {
  const p = document.createElement('div'); p.className='pigeon';
  p.textContent = '🐦';
  p.style.left = (10 + Math.random()*80) + '%';
  p.style.top  = (65 + Math.random()*25) + '%';
  document.body.appendChild(p);
  pigeons.push(p);
}
let n = 0;
document.body.addEventListener('click', (e) => {
  if (e.target.closest('a, h1')) return;
  const crumb = document.createElement('div'); crumb.className='crumb';
  crumb.textContent = '🍞';
  crumb.style.left = e.pageX + 'px'; crumb.style.top = e.pageY + 'px';
  document.body.appendChild(crumb);
  setTimeout(() => crumb.remove(), 600);
  n++; document.getElementById('n').textContent = n;
  // Closest pigeon flies to crumb
  let closest = null, bestD = 1e9;
  pigeons.forEach(p => {
    const r = p.getBoundingClientRect();
    const d = Math.hypot(r.left - e.pageX, r.top - e.pageY);
    if (d < bestD) { bestD = d; closest = p; }
  });
  if (closest) {
    closest.style.left = (e.pageX - 15) + 'px';
    closest.style.top  = (e.pageY - 15) + 'px';
    closest.classList.add('eating');
    setTimeout(() => closest.classList.remove('eating'), 800);
  }
});
</script>
<!-- +marker+: if Fullscreen Forever is on in the vault, go fullscreen on first tap -->
<script>(function(){try{if(localStorage.getItem("fsForever")==="1"){var go=function(){var el=document.documentElement,r=el.requestFullscreen||el.webkitRequestFullscreen;if(r){try{var p=r.call(el);if(p&&p.catch)p.catch(function(){});}catch(e){}}window.removeEventListener("click",go);window.removeEventListener("touchend",go);};window.addEventListener("click",go);window.addEventListener("touchend",go,{passive:true});}}catch(e){}})();</script>
</body></html>
