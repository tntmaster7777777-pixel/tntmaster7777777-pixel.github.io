<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>Cat Storm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#ffdfe9,#ffe6d4);color:#552;font-family:'Courier New',monospace;
  height:100vh;overflow:hidden;cursor:crosshair}
h1{position:absolute;top:20px;left:0;right:0;text-align:center;font-size:32px;color:#a55;letter-spacing:4px;z-index:2}
.cat{position:absolute;font-size:40px;pointer-events:none;animation:catfall var(--dur) linear forwards;
  user-select:none}
@keyframes catfall{
  to{transform:translate(var(--dx),100vh) rotate(var(--rot))}
}
#hud{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#a55;letter-spacing:3px;z-index:2}
.back{position:absolute;top:20px;right:20px;color:#a55;text-decoration:none;font-size:12px;letter-spacing:2px;z-index:2}
</style></head><body>
<h1>🐱 CAT STORM 🐱</h1>
<a class="back" href="../index.html">← back</a>
<div id="hud">click anywhere · cats: <span id="n">0</span></div>
<script>
let n = 0;
const CATS = ['🐱','😺','😸','😹','😻','😼','😽','🙀','😿','😾','🐈','🐈‍⬛'];
function spawn(x, y) {
  for (let i = 0; i < 5; i++) {
    const c = document.createElement('div'); c.className='cat';
    c.textContent = CATS[Math.floor(Math.random()*CATS.length)];
    c.style.left = (x + (Math.random()-0.5)*100) + 'px';
    c.style.top  = y + 'px';
    c.style.setProperty('--dx', ((Math.random()-0.5)*300) + 'px');
    c.style.setProperty('--rot', (Math.random()*720-360) + 'deg');
    c.style.setProperty('--dur', (2 + Math.random()*3) + 's');
    document.body.appendChild(c);
    n++;
    setTimeout(() => c.remove(), 5000);
  }
  document.getElementById('n').textContent = n;
}
document.body.addEventListener('click', e => spawn(e.pageX, e.pageY));
// Initial shower
for (let i = 0; i < 5; i++) {
  setTimeout(() => spawn(Math.random()*innerWidth, -50), i * 200);
}
</script></body></html>
