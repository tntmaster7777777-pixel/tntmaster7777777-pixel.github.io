<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>Moon Cheese</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;height:100vh;overflow:hidden;
  display:flex;align-items:center;justify-content:center;cursor:crosshair}
.stars{position:fixed;inset:0}
.star{position:absolute;background:#fff;width:2px;height:2px;border-radius:50%}
#moon{width:300px;height:300px;background:radial-gradient(circle at 35% 30%,#fff5b0,#e6c878 50%,#9c7a3f);
  border-radius:50%;position:relative;box-shadow:0 0 60px rgba(255,240,180,.5);cursor:pointer}
.crater{position:absolute;background:#9c7a3f;border-radius:50%;cursor:pointer;
  box-shadow:inset 2px 2px 8px rgba(0,0,0,.4);transition:transform .15s}
.crater:hover{transform:scale(1.1)}
.crater.eaten{background:#000;cursor:default;transform:scale(.8);opacity:.5}
#hud{position:absolute;top:20px;left:20px;font-size:18px}
.back{position:absolute;top:20px;right:20px;color:#aaa;text-decoration:none;font-size:12px;letter-spacing:2px}
#msg{position:absolute;bottom:40px;left:0;right:0;text-align:center;font-size:22px;color:#ffe680}
</style></head><body>
<div class="stars" id="stars"></div>
<a class="back" href="../index.html">← back</a>
<div id="hud">🧀 Cheese eaten: <span id="score">0</span></div>
<div id="moon" id="moonEl"></div>
<div id="msg">Click the craters. They're cheese.</div>
<script>
const stars = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  const s = document.createElement('div'); s.className='star';
  s.style.left = Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
  stars.appendChild(s);
}
const moon = document.querySelector('#moon');
const positions = [[15,20,50],[60,15,40],[20,60,60],[55,55,70],[70,70,35],[35,40,45],[80,30,30]];
let eaten = 0;
positions.forEach(([x,y,size]) => {
  const c = document.createElement('div'); c.className='crater';
  c.style.left = x+'%'; c.style.top=y+'%'; c.style.width=size+'px'; c.style.height=size+'px';
  c.onclick = (e) => {
    e.stopPropagation();
    if (c.classList.contains('eaten')) return;
    c.classList.add('eaten');
    eaten++;
    document.getElementById('score').textContent = eaten;
    if (eaten === positions.length) {
      document.getElementById('msg').textContent = "🌑 You ate the whole moon. The astronauts are upset.";
    }
  };
  moon.appendChild(c);
});
</script>
<!-- +marker+: if Fullscreen Forever is on in the vault, go fullscreen on first tap -->
<script>(function(){try{if(localStorage.getItem("fsForever")==="1"){var go=function(){var el=document.documentElement,r=el.requestFullscreen||el.webkitRequestFullscreen;if(r){try{var p=r.call(el);if(p&&p.catch)p.catch(function(){});}catch(e){}}window.removeEventListener("click",go);window.removeEventListener("touchend",go);};window.addEventListener("click",go);window.addEventListener("touchend",go,{passive:true});}}catch(e){}})();</script>

<script>/* gamepad-bridge */(function(){if(!navigator.getGamepads)return;var st={};function K(t,k,c,kc){window.dispatchEvent(new KeyboardEvent(t,{key:k,code:c,keyCode:kc,which:kc,bubbles:true}));}function set(id,dn,k,c,kc){if(dn&&!st[id]){st[id]=1;K("keydown",k,c,kc);}else if(!dn&&st[id]){st[id]=0;K("keyup",k,c,kc);}}function bd(p,i){return p.buttons[i]&&p.buttons[i].pressed;}function loop(){var ps=navigator.getGamepads();for(var i=0;i<ps.length;i++){var p=ps[i];if(!p)continue;var x=p.axes[0]||0,y=p.axes[1]||0;set("L",x<-.5||bd(p,14),"ArrowLeft","ArrowLeft",37);set("R",x>.5||bd(p,15),"ArrowRight","ArrowRight",39);set("U",y<-.5||bd(p,12),"ArrowUp","ArrowUp",38);set("D",y>.5||bd(p,13),"ArrowDown","ArrowDown",40);set("Asp",bd(p,0)," ","Space",32);set("Aen",bd(p,0),"Enter","Enter",13);set("Bsh",bd(p,1),"Shift","ShiftLeft",16);break;}requestAnimationFrame(loop);}requestAnimationFrame(loop);})();</script>
</body></html>
