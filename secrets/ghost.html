<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>Ghost Party</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#fff;font-family:'Courier New',monospace;height:100vh;overflow:hidden;cursor:crosshair}
.ghost{position:absolute;font-size:60px;animation:float 4s ease-in-out infinite;cursor:pointer;
  text-shadow:0 0 20px rgba(255,255,255,.6);user-select:none}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
.ghost:hover{transform:scale(1.2)}
.ghost.scared{animation:flee 1s forwards}
@keyframes flee{to{transform:translate(var(--fx),-300px) scale(0);opacity:0}}
h1{position:absolute;top:30px;left:0;right:0;text-align:center;font-size:32px;letter-spacing:6px;
  color:#b0b0ff;text-shadow:0 0 20px rgba(180,180,255,.6)}
#hud{position:absolute;bottom:30px;left:0;right:0;text-align:center;color:#9999cc}
.back{position:absolute;top:20px;right:20px;color:#666;text-decoration:none;font-size:12px;letter-spacing:2px}
.boo{position:absolute;font-size:32px;font-weight:bold;color:#fff;pointer-events:none;
  animation:boopop .6s forwards}
@keyframes boopop{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
</style></head><body>
<h1>👻 GHOST PARTY 👻</h1>
<a class="back" href="../index.html">← back</a>
<div id="hud">Scared: <span id="score">0</span> / 12</div>
<script>
let scared = 0;
const ghosts = ['👻','👻','👻','👻','👻','👻','👻','👻','👻','👻','👻','👻'];
ghosts.forEach((g, i) => {
  const el = document.createElement('div');
  el.className = 'ghost';
  el.textContent = g;
  el.style.left = (5 + Math.random()*85) + '%';
  el.style.top  = (15 + Math.random()*70) + '%';
  el.style.animationDelay = (Math.random() * 4) + 's';
  el.onclick = (e) => {
    if (el.classList.contains('scared')) return;
    const dir = (Math.random()-0.5) * 600;
    el.style.setProperty('--fx', dir + 'px');
    el.classList.add('scared');
    scared++;
    document.getElementById('score').textContent = scared;
    // Boo popup
    const boo = document.createElement('div');
    boo.className = 'boo';
    boo.textContent = ['BOO!','EEK!','SPOOK!','AAH!'][Math.floor(Math.random()*4)];
    boo.style.left = e.pageX + 'px'; boo.style.top = e.pageY + 'px';
    document.body.appendChild(boo);
    setTimeout(() => boo.remove(), 600);
    if (scared === 12) {
      document.getElementById('hud').innerHTML = '🎉 Party over. The ghosts have all fled.';
    }
  };
  document.body.appendChild(el);
});
</script></body></html>
