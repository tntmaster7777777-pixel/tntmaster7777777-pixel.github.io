<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta charset="UTF-8"><title>The Void</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#222;font-family:'Courier New',monospace;height:100vh;overflow:hidden;cursor:crosshair}
.whisper{position:absolute;color:#444;font-size:12px;letter-spacing:3px;
  pointer-events:none;animation:fade 6s linear forwards}
@keyframes fade{0%{opacity:0}10%{opacity:.8}100%{opacity:0;transform:translateY(-40px)}}
h1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:50px;letter-spacing:20px;color:#111;user-select:none}
.back{position:absolute;top:20px;right:20px;color:#222;text-decoration:none;font-size:11px;letter-spacing:2px}
#counter{position:absolute;bottom:20px;left:20px;color:#222;font-size:11px}
</style></head><body>
<h1>VOID</h1>
<a class="back" href="../index.html">← back</a>
<div id="counter">whispers: <span id="n">0</span></div>
<script>
const WHISPERS = ['hello.','why are you here.','it is cold.','you are alone.','i can see you.',
  'turn back.','the void stares back.','quiet.','nothing.','keep going.','too late.',
  'goodbye.','again.','please.','no.'];
let count = 0;
document.body.addEventListener('click', (e) => {
  count++;
  document.getElementById('n').textContent = count;
  const w = document.createElement('div');
  w.className = 'whisper';
  w.textContent = WHISPERS[Math.floor(Math.random()*WHISPERS.length)];
  w.style.left = e.pageX + 'px'; w.style.top = e.pageY + 'px';
  document.body.appendChild(w);
  setTimeout(() => w.remove(), 6000);
  if (count === 50) {
    document.querySelector('h1').textContent = '∞';
  }
});
</script>
<!-- +marker+: if Fullscreen Forever is on in the vault, go fullscreen on first tap -->
<script>(function(){try{if(localStorage.getItem("fsForever")==="1"){var go=function(){var el=document.documentElement,r=el.requestFullscreen||el.webkitRequestFullscreen;if(r){try{var p=r.call(el);if(p&&p.catch)p.catch(function(){});}catch(e){}}window.removeEventListener("click",go);window.removeEventListener("touchend",go);};window.addEventListener("click",go);window.addEventListener("touchend",go,{passive:true});}}catch(e){}})();</script>

<script>/* gamepad-bridge */(function(){if(!navigator.getGamepads)return;var st={};function K(t,k,c,kc){window.dispatchEvent(new KeyboardEvent(t,{key:k,code:c,keyCode:kc,which:kc,bubbles:true}));}function set(id,dn,k,c,kc){if(dn&&!st[id]){st[id]=1;K("keydown",k,c,kc);}else if(!dn&&st[id]){st[id]=0;K("keyup",k,c,kc);}}function bd(p,i){return p.buttons[i]&&p.buttons[i].pressed;}function loop(){var ps=navigator.getGamepads();for(var i=0;i<ps.length;i++){var p=ps[i];if(!p)continue;var x=p.axes[0]||0,y=p.axes[1]||0;set("L",x<-.5||bd(p,14),"ArrowLeft","ArrowLeft",37);set("R",x>.5||bd(p,15),"ArrowRight","ArrowRight",39);set("U",y<-.5||bd(p,12),"ArrowUp","ArrowUp",38);set("D",y>.5||bd(p,13),"ArrowDown","ArrowDown",40);set("Asp",bd(p,0)," ","Space",32);set("Aen",bd(p,0),"Enter","Enter",13);set("Bsh",bd(p,1),"Shift","ShiftLeft",16);break;}requestAnimationFrame(loop);}requestAnimationFrame(loop);})();</script>
</body></html>
